openapi: 3.0.3

info:
  title: ARCHIVE API
  version: 1.0.0
  description: |
    **ARCHIVE-BE** — 개인 생산성 및 회고 관리 백엔드 API.

    Clean Architecture 기반 (Domain → Application → Infrastructure → Presentation).

    ### 인증 방식
    - **Access Token**: `Authorization: Bearer <JWT>` 헤더 (만료 15분)
    - **Refresh Token**: `refresh_token` HttpOnly Cookie (만료 7일, `Secure`, `SameSite=Lax`)

    ### 공통 응답 포맷
    모든 응답은 아래 래퍼를 사용한다.
    ```json
    { "status": "success" | "accepted" | "error", "code": "OK", "data": { ... } }
    ```
    에러 응답은 `data: null`이며 `details[]`가 추가된다.

    ### AI 요약 비동기 처리
    `POST /summaries/generate`는 `202 Accepted`만 반환한다.
    실제 결과는 Celery worker가 처리하며, 클라이언트는 `GET /summaries/{id}/stream` SSE로 완료 신호를 받는다.

servers:
  - url: http://localhost:8000/api/v1
    description: 로컬 개발 서버
  - url: https://api.archive.example.com/api/v1
    description: 운영 서버 (placeholder)

tags:
  - name: auth
    description: 회원가입·로그인·토큰·OAuth·프로필
  - name: todos
    description: 할 일(Todo) CRUD
  - name: entries
    description: 회고 엔트리(일·주·월·연) CRUD
  - name: summaries
    description: AI 회고 요약 (비동기 + SSE)
  - name: notifications
    description: 알림 목록·읽음 처리·SSE 스트림
  - name: settings
    description: 유저 환경설정 (자동 요약, 알림 보존 등)
  - name: github
    description: GitHub 저장소 연결·동기화 (OAuth access_token 재사용)

x-tagGroups:
  - name: Account
    tags: [auth, settings]
  - name: Retrospective
    tags: [entries, summaries]
  - name: Productivity
    tags: [todos, notifications]
  - name: Integrations
    tags: [github]

security:
  - BearerAuth: []

# ────────────────────────────────────────────────────────────────────────────────
paths:
  # ────────────────────────────────────────────────────────────────────────────────

  # ════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════════════

  /auth/email/verify/send:
    post:
      tags: [auth]
      summary: 이메일 인증 코드 발송
      description: 회원가입 전 이메일 소유 확인용 6자리 코드를 발송한다. 재발송 쿨다운 60초.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendVerificationRequest"
            example:
              email: user@example.com
      responses:
        "200":
          description: 코드 발송 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmpty"
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /auth/email/verify/confirm:
    post:
      tags: [auth]
      summary: 이메일 인증 코드 확인
      description: 발송된 6자리 코드를 검증하고 30분간 "인증 완료" 상태를 유지한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
            example:
              email: user@example.com
              code: "123456"
      responses:
        "200":
          description: 인증 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_2FA_CODE_INVALID

  /auth/register:
    post:
      tags: [auth]
      summary: 회원가입
      description: |
        이메일 인증 완료 상태에서만 호출 가능.
        성공 시 access token은 body, refresh token은 HttpOnly Cookie로 발급된다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              email: user@example.com
              password: strongPass1!
              passwordConfirm: strongPass1!
              country: KR
              region: null
      responses:
        "201":
          description: 가입 성공
          headers:
            Set-Cookie:
              description: "`refresh_token` HttpOnly cookie (7d)"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_EMAIL_NOT_VERIFIED
        - USER_EMAIL_INVALID
        - USER_EMAIL_DUPLICATED
        - AUTH_COUNTRY_INVALID
        - AUTH_COUNTRY_REGION_REQUIRED

  /auth/login:
    post:
      tags: [auth]
      summary: 이메일 + 비밀번호 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: user@example.com
              password: strongPass1!
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: "`refresh_token` HttpOnly cookie (7d)"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_INVALID_CREDENTIALS

  /auth/token/refresh:
    post:
      tags: [auth]
      summary: Access Token 재발급
      description: |
        `refresh_token` Cookie를 사용해 새 access token + 새 refresh token을 발급한다.
        rotation 방식으로 이전 refresh token은 즉시 폐기된다.
      security:
        - RefreshCookie: []
      responses:
        "200":
          description: 재발급 성공
          headers:
            Set-Cookie:
              description: "회전된 새 `refresh_token` Cookie"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
      x-error-codes:
        - AUTH_REFRESH_TOKEN_INVALID
        - AUTH_REFRESH_TOKEN_REVOKED

  /auth/logout:
    post:
      tags: [auth]
      summary: 로그아웃
      description: refresh token을 폐기하고 쿠키를 삭제한다.
      security:
        - BearerAuth: []
        - RefreshCookie: []
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /auth/me:
    get:
      tags: [auth]
      summary: 내 정보 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - USER_NOT_FOUND

    patch:
      tags: [auth]
      summary: 프로필 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            example:
              display_name: 변경된 이름
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"

  /auth/oauth/{provider}/authorize:
    get:
      tags: [auth]
      summary: OAuth 인증 시작 (리다이렉트)
      description: |
        해당 provider의 OAuth 인증 페이지로 **302 Redirect**한다.
        프론트에서 이 URL을 새 창/팝업으로 열어 사용한다.
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProviderPath"
      responses:
        "302":
          description: OAuth provider로 리다이렉트
          headers:
            Location:
              description: provider의 authorize URL
              schema: { type: string, format: uri }

  /auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth 콜백 (provider → 백엔드)
      description: |
        OAuth provider가 redirect로 호출하는 콜백. **클라이언트가 직접 호출하지 않는다.**

        응답은 HTML이며 팝업 창에서 `window.opener.postMessage()`로 부모 창에 결과를 전달한다.

        ### 분기
        - **기존 사용자** → `oauth_success` + access token + `refresh_token` HttpOnly Cookie
        - **신규 사용자** (OAuth 첫 사용) → `oauth_onboarding_required` + `onboarding_token` HttpOnly Cookie (TTL 30분).
          FE는 `/onboarding` 페이지로 이동해 `POST /auth/oauth/onboarding`에서 국가 정보를 추가 입력해 가입을 완료한다.

        ```js
        // 기존 사용자
        { type: "oauth_success", access_token: "..." }
        // 신규 사용자
        { type: "oauth_onboarding_required" }
        // 실패
        { type: "oauth_error", error: "<ERROR_CODE>" }
        ```
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProviderPath"
        - in: query
          name: code
          schema: { type: string }
          description: provider가 발급한 인가 코드
        - in: query
          name: state
          schema: { type: string }
          description: CSRF 방지용 state (initiate 시 발급된 값)
        - in: query
          name: error
          schema: { type: string }
          description: provider가 에러를 반환한 경우의 코드
      responses:
        "200":
          description: HTML 응답 (postMessage 스크립트 포함)
          headers:
            Set-Cookie:
              description: |
                기존 사용자 → `refresh_token` HttpOnly Cookie (7d)
                신규 사용자 → `onboarding_token` HttpOnly Cookie (30min)
              schema: { type: string }
          content:
            text/html:
              schema: { type: string }
      x-error-codes:
        - AUTH_OAUTH_STATE_INVALID

  /auth/oauth/onboarding:
    post:
      tags: [auth]
      summary: OAuth 신규 사용자 온보딩 완료
      description: |
        OAuth 콜백 단계에서 `onboarding_token` HttpOnly Cookie를 받은 신규 사용자가 국가 정보를
        추가 입력해 가입을 완료한다.

        - 다중 tz 국가(US/CA/RU/AU/BR/MX/ID/AR/CL/KZ/MN)는 `region` 필수 (ISO 3166-2: 예 `US-CA`)
        - 단일 tz 국가는 `region` 생략 가능
        - 성공 시 `onboarding_token` Cookie 삭제 + `refresh_token` Cookie + access token body
      security:
        - OnboardingCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardingCompleteRequest" }
            examples:
              korea:
                summary: 한국 (단일 tz)
                value: { country: KR }
              us_california:
                summary: 미국 캘리포니아 (다중 tz)
                value: { country: US, region: US-CA }
      responses:
        "201":
          description: 가입 완료
          headers:
            Set-Cookie:
              description: "`refresh_token` HttpOnly cookie (7d) + `onboarding_token` 삭제"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_ONBOARDING_TOKEN_INVALID
        - AUTH_ONBOARDING_TOKEN_EXPIRED
        - AUTH_COUNTRY_INVALID
        - AUTH_COUNTRY_REGION_REQUIRED
        - USER_EMAIL_DUPLICATED

  # ════════════════════════════════════════════════════════════════════════════
  # TODOS
  # ════════════════════════════════════════════════════════════════════════════

  /todos:
    get:
      tags: [todos]
      summary: 할 일 목록 조회
      description: |
        쿼리 파라미터에 따라 모드가 결정된다:
        - `dateKey` 단독 → 해당 일자의 할 일
        - `from` + `to` → 기간 범위 조회
        - 둘 다 없으면 빈 배열 반환
      parameters:
        - in: query
          name: dateKey
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
          example: "2026-05-31"
        - in: query
          name: from
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: to
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseTodoList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    post:
      tags: [todos]
      summary: 할 일 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TodoCreateRequest" }
            example:
              title: 회의 자료 준비
              date_key: "2026-05-31"
              description: 회의 슬라이드 작성
              status: not-start
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseTodo" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /todos/{todo_id}:
    parameters:
      - $ref: "#/components/parameters/TodoIdPath"

    patch:
      tags: [todos]
      summary: 할 일 수정 (부분)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TodoUpdateRequest" }
            example:
              status: done
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseTodo" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - TODO_NOT_FOUND
        - TODO_ALREADY_COMPLETED
        - TODO_ALREADY_IN_PROGRESS

    delete:
      tags: [todos]
      summary: 할 일 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - TODO_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # ENTRIES (회고 엔트리)
  # ════════════════════════════════════════════════════════════════════════════

  /entries:
    get:
      tags: [entries]
      summary: 회고 엔트리 목록 조회
      description: 회고 종류·기간 필터로 조회한다.
      parameters:
        - in: query
          name: retroType
          schema: { $ref: "#/components/schemas/RetroType" }
        - in: query
          name: from
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: to
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    post:
      tags: [entries]
      summary: 회고 엔트리 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EntryCreateRequest" }
            example:
              date_key: "2026-05-31"
              title: 5월 31일 회고
              content: 오늘은 ...
              retro_type: daily
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - JOURNAL_ENTRY_ALREADY_EXISTS

  /entries/{entry_id}:
    parameters:
      - $ref: "#/components/parameters/EntryIdPath"

    get:
      tags: [entries]
      summary: 단일 엔트리 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - JOURNAL_ENTRY_NOT_FOUND

    put:
      tags: [entries]
      summary: 엔트리 Upsert
      description: 존재하면 수정, 없으면 생성한다 (idempotent).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EntryUpsertRequest" }
      responses:
        "200":
          description: Upsert 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }

    delete:
      tags: [entries]
      summary: 엔트리 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - JOURNAL_ENTRY_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARIES (AI 요약)
  # ════════════════════════════════════════════════════════════════════════════

  /summaries/generate:
    post:
      tags: [summaries]
      summary: AI 요약 생성 요청 (비동기)
      description: |
        Celery worker(`ai_tasks` 큐, priority=9)로 요약 작업을 enqueue하고 **즉시 202를 반환**한다.

        - 같은 기간에 PENDING/IN_PROGRESS 요약이 있으면 `409 RETRO_SUMMARY_IN_PROGRESS` 반환
        - COMPLETED 요약이 있으면 그대로 반환 (재실행하지 않음)
        - FAILED 요약은 자동으로 PENDING 리셋 후 재실행
        - Gemini 호출은 rate_limit `60/min` 적용
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
        - in: query
          name: periodStart
          schema: { type: string, format: date }
          description: |
            생략 시 직전 기간 자동 계산 (지난 주 월~일 / 지난 달 / 작년).
            지정 시 해당 기간의 시작일 (월요일/1일/1월1일).
      responses:
        "202":
          description: 요청 접수
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
      x-error-codes:
        - RETRO_SUMMARY_IN_PROGRESS
        - RETRO_SUMMARY_INVALID_STATE

  /summaries:
    get:
      tags: [summaries]
      summary: 요약 목록 조회 (타입별)
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummaryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /summaries/{summary_id}:
    parameters:
      - $ref: "#/components/parameters/SummaryIdPath"

    get:
      tags: [summaries]
      summary: 단일 요약 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - RETRO_SUMMARY_NOT_FOUND

  /summaries/{summary_id}/stream:
    parameters:
      - $ref: "#/components/parameters/SummaryIdPath"

    get:
      tags: [summaries]
      summary: 요약 완료 SSE 스트림
      description: |
        Celery worker가 요약 처리를 완료할 때까지 대기하며, 완료 시 단일 SSE 이벤트를 전송하고 종료한다.

        - **타임아웃**: 5분 (이후 `{"status": "timeout"}` 전송)
        - 이미 완료/실패 상태면 즉시 이벤트 전송 후 종료

        ### 이벤트 페이로드
        ```
        data: {"status": "completed", "summary_id": "summ_..."}
        data: {"status": "failed",    "summary_id": "summ_..."}
        data: {"status": "timeout",   "summary_id": "summ_..."}
        data: {"status": "error",     "error": "<ERROR_CODE>"}
        ```
      responses:
        "200":
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                example: 'data: {"status":"completed","summary_id":"summ_abc"}\n\n'
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS
  # ════════════════════════════════════════════════════════════════════════════

  /notifications/stream:
    get:
      tags: [notifications]
      summary: 알림 실시간 SSE 스트림
      description: |
        Redis pub/sub 채널 `notifications:{user_id}`를 구독하여 새 알림을 실시간 푸시한다.

        - **타임아웃**: 5분 (이후 `{"type": "timeout"}` 전송)
        - 페이로드는 `NotificationResponse`와 동일 + (`type`/`category` 포함)
      responses:
        "200":
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                example: 'data: {"id":"noti_abc","type":"success","category":"summary","title":"...","message":"..."}\n\n'
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /notifications:
    get:
      tags: [notifications]
      summary: 알림 목록 조회
      parameters:
        - in: query
          name: unreadOnly
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseNotificationList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    delete:
      tags: [notifications]
      summary: 알림 일괄 삭제
      parameters:
        - in: query
          name: readOnly
          schema: { type: boolean, default: false }
          description: true면 읽은 알림만 삭제, false면 전체 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /notifications/read-all:
    patch:
      tags: [notifications]
      summary: 모든 알림 읽음 처리
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /notifications/{notification_id}/read:
    parameters:
      - $ref: "#/components/parameters/NotificationIdPath"

    patch:
      tags: [notifications]
      summary: 단일 알림 읽음 처리
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - NOTIFICATION_NOT_FOUND

  /notifications/{notification_id}:
    parameters:
      - $ref: "#/components/parameters/NotificationIdPath"

    delete:
      tags: [notifications]
      summary: 단일 알림 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - NOTIFICATION_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # SETTINGS
  # ════════════════════════════════════════════════════════════════════════════

  /settings:
    get:
      tags: [settings]
      summary: 유저 설정 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSettings" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    put:
      tags: [settings]
      summary: 유저 설정 수정 (전체 교체)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingsRequest" }
            example:
              locale: ko
              autoSummaryWeekly: true
              autoSummaryMonthly: true
              autoSummaryYearly: false
              notificationRetentionDays: 30
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSettings" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /settings/country:
    patch:
      tags: [settings]
      summary: 국가/하위지역 변경 — timezone 자동 재계산
      description: |
        사용자 국가를 변경하면 backend가 country/region 조합으로 timezone을 재계산해 같이 저장한다.
        AI 자동 요약 트리거 시간(현지 1am)도 새 timezone 기준으로 자동 갱신된다.

        - 다중 tz 국가는 `region`(ISO 3166-2) 필수
        - 단일 tz 국가는 `region` 생략 가능
        - 임의로 timezone만 단독 변경하려면 `PATCH /settings/timezone` 사용
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCountryRequest" }
            examples:
              korea: { value: { country: KR } }
              us_ca: { value: { country: US, region: US-CA } }
              japan: { value: { country: JP } }
      responses:
        "200":
          description: 수정 성공 (timezone 포함된 user 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_COUNTRY_INVALID
        - AUTH_COUNTRY_REGION_REQUIRED
        - USER_NOT_FOUND

  /settings/timezone:
    patch:
      tags: [settings]
      summary: Timezone 단독 변경 (country는 유지)
      description: |
        country를 바꾸지 않고 timezone만 별도로 override한다. 해외 출장/임시 거주 등의 케이스용.
        IANA 식별자(`Asia/Seoul`, `America/Los_Angeles` 등) 형식이어야 한다.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTimezoneRequest" }
            example:
              timezone: America/Los_Angeles
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_TIMEZONE_INVALID
        - USER_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # GITHUB
  # ════════════════════════════════════════════════════════════════════════════

  /github/repositories/available:
    get:
      tags: [github]
      summary: GitHub에서 사용자 저장소 목록 조회
      description: |
        OAuth로 연결된 GitHub 계정의 모든 **public** 저장소 목록을 GitHub API에서 직접 가져온다.
        DB 저장은 하지 않음 (연결 후보 표시 용도).
        - `public_repo` scope 기준
        - 페이지네이션 자동 처리 (최대 2000개)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseAvailableRepoList" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "429":
          $ref: "#/components/responses/RateLimited_429"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_RATE_LIMITED
        - GITHUB_API_UNAVAILABLE

  /github/repositories:
    get:
      tags: [github]
      summary: 연결된 저장소 목록 조회
      description: DB에 저장된, 현재 사용자가 연결한 GitHub 저장소 목록.
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepositoryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    post:
      tags: [github]
      summary: 특정 저장소 1개 연결
      description: |
        `githubRepoId`로 식별되는 저장소를 사용자 계정에 연결한다.
        백엔드가 GitHub API에서 해당 저장소 메타데이터를 직접 조회해 저장 (위·변조 방지).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LinkRepositoryRequest" }
            example:
              githubRepoId: 1296269
      responses:
        "201":
          description: 연결 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepository" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
        "429":
          $ref: "#/components/responses/RateLimited_429"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_REPOSITORY_NOT_FOUND
        - GITHUB_REPOSITORY_ALREADY_LINKED
        - GITHUB_RATE_LIMITED

    delete:
      tags: [github]
      summary: 모든 저장소 연결 해제
      description: 현재 사용자의 모든 GitHub 저장소 연결을 일괄 삭제.
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /github/repositories/sync-all:
    post:
      tags: [github]
      summary: GitHub 저장소 전체 일괄 연결 (1회 sync)
      description: |
        호출 시점의 GitHub 저장소 목록을 모두 가져와 일괄 연결한다 (idempotent upsert).
        이후 새로 생긴 repo는 사용자가 다시 호출해야 추가됨 (자동 갱신 없음).
        이미 연결된 저장소는 유지되며, 메타데이터가 바뀌었다면 갱신된다.
      responses:
        "200":
          description: sync 성공. 응답에는 현재 시점에 연결된 모든 저장소 목록이 담긴다.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepositoryList" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "429":
          $ref: "#/components/responses/RateLimited_429"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_RATE_LIMITED
        - GITHUB_API_UNAVAILABLE

  /github/repositories/{repository_id}:
    parameters:
      - in: path
        name: repository_id
        required: true
        schema: { type: string }
        example: ghrepo_01HXYZ...

    delete:
      tags: [github]
      summary: 단일 저장소 연결 해제
      responses:
        "200":
          description: 해제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - GITHUB_REPOSITORY_NOT_FOUND

# ────────────────────────────────────────────────────────────────────────────────
components:
  # ────────────────────────────────────────────────────────────────────────────────

  # ════════════════════════════════════════════════════════════════════════════
  securitySchemes:
    # ════════════════════════════════════════════════════════════════════════════
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "`Authorization: Bearer <access_token>` (만료 15분)"
    RefreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly · Secure · SameSite=Lax · Max-Age 7d
    OnboardingCookie:
      type: apiKey
      in: cookie
      name: onboarding_token
      description: |
        OAuth 신규 사용자 온보딩용 임시 토큰. HttpOnly · Secure · SameSite=Lax · Max-Age 30분.
        Redis에 `auth:onboarding:{token} → {provider, provider_user_id, email}` 형태로 적재됨.
        클라이언트가 `POST /auth/oauth/onboarding`에서 사용 후 즉시 삭제된다.

  # ════════════════════════════════════════════════════════════════════════════
  parameters:
    # ════════════════════════════════════════════════════════════════════════════
    TodoIdPath:
      in: path
      name: todo_id
      required: true
      schema: { type: string }
      example: todo_01HXYZ...
    EntryIdPath:
      in: path
      name: entry_id
      required: true
      schema: { type: string }
      example: entry_01HXYZ...
    SummaryIdPath:
      in: path
      name: summary_id
      required: true
      schema: { type: string }
      example: summ_01HXYZ...
    NotificationIdPath:
      in: path
      name: notification_id
      required: true
      schema: { type: string }
      example: noti_01HXYZ...
    OAuthProviderPath:
      in: path
      name: provider
      required: true
      schema: { $ref: "#/components/schemas/OAuthProvider" }

  # ════════════════════════════════════════════════════════════════════════════
  responses:
    # ════════════════════════════════════════════════════════════════════════════
    BadRequest_400:
      description: 잘못된 요청 (도메인 invalid state)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: RETRO_SUMMARY_INVALID_STATE
            data: null
            details: []
    Unauthorized_401:
      description: |
        인증 실패. 가능한 코드:
        - `AUTH_TOKEN_EXPIRED` — access token 만료 (**FE 자동 refresh 트리거**)
        - `AUTH_TOKEN_INVALID` — 토큰 누락 / 형식 오류 / 서명 불일치 / type mismatch
        - `AUTH_INVALID_CREDENTIALS` — 이메일/비밀번호 불일치
        - `AUTH_REFRESH_TOKEN_INVALID` / `AUTH_REFRESH_TOKEN_REVOKED` — refresh 실패
        - `AUTH_OAUTH_STATE_INVALID` — OAuth state 검증 실패
        - `AUTH_ONBOARDING_TOKEN_INVALID` — onboarding cookie 누락
        - `AUTH_ONBOARDING_TOKEN_EXPIRED` — onboarding TTL(30분) 만료
        - `GITHUB_TOKEN_INVALID` — GitHub OAuth 토큰 만료/폐기 (FE는 GitHub OAuth 재인증 유도)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: AUTH_TOKEN_EXPIRED
            data: null
            details: []
    NotFound_404:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: TODO_NOT_FOUND
            data: null
            details: []
    Conflict_409:
      description: 상태 충돌 (중복·이미 진행 중 등)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: USER_EMAIL_DUPLICATED
            data: null
            details: []
    ValidationError_422:
      description: 요청 검증 실패 (Pydantic)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: VALIDATION_ERROR
            data: null
            details:
              - field: email
                message: value is not a valid email address
    RateLimited_429:
      description: GitHub API rate limit 초과. 잠시 후 재시도.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: GITHUB_RATE_LIMITED
            data: null
            details: []
    ServiceUnavailable_503:
      description: 외부 서비스(GitHub API) 일시적 장애
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: GITHUB_API_UNAVAILABLE
            data: null
            details: []

  # ════════════════════════════════════════════════════════════════════════════
  schemas:
    # ════════════════════════════════════════════════════════════════════════════

    # ── 공통 래퍼 ────────────────────────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      required: [status, code, data]
      properties:
        status: { type: string, enum: [success, accepted] }
        code: { type: string, example: OK }
        data: { type: "null" }

    ErrorResponse:
      type: object
      required: [status, code, data]
      properties:
        status: { type: string, enum: [error] }
        code:
          type: string
          description: 도메인 에러 코드 (예 `AUTH_TOKEN_EXPIRED`, `TODO_NOT_FOUND`, `VALIDATION_ERROR`)
        data: { type: "null" }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    # ── Enum 정의 ───────────────────────────────────────────────────────────
    OAuthProvider:
      type: string
      enum: [github, google]

    RetroType:
      type: string
      enum: [daily, weekly, monthly, yearly]
      description: 회고 엔트리 종류

    SummaryType:
      type: string
      enum: [weekly, monthly, annual]
      description: AI 요약 주기

    TodoStatus:
      type: string
      enum: [not-start, in-progress, done]

    SummaryStatus:
      type: string
      enum: [pending, in_progress, completed, failed]

    NotificationType:
      type: string
      enum: [info, success, warning, error]

    NotificationCategory:
      type: string
      enum: [sync, summary, system]

    # ── Auth Request ───────────────────────────────────────────────────────
    SendVerificationRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code:
          type: string
          pattern: "^[A-Z0-9]{6}$"
          description: 영문 대문자 또는 숫자 6자리 (서버에서 strip + upper 정규화 후 검증)

    RegisterRequest:
      type: object
      required: [email, password, passwordConfirm, country]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        passwordConfirm: { type: string, minLength: 8 }
        country:
          type: string
          pattern: "^[A-Z]{2}$"
          description: |
            ISO 3166-1 alpha-2 국가 코드 (예: `KR`, `US`, `JP`).
            다중 tz 국가(US/CA/RU/AU/BR/MX/ID/AR/CL/KZ/MN)는 `region` 필수.
        region:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}-[A-Z0-9]{1,3}$"
          description: |
            ISO 3166-2 하위지역 코드 (예: `US-CA`, `CA-ON`).
            단일 tz 국가는 생략 가능 (`null`).

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    UpdateProfileRequest:
      type: object
      properties:
        display_name: { type: string, nullable: true }

    OnboardingCompleteRequest:
      type: object
      required: [country]
      properties:
        country: { type: string, pattern: "^[A-Z]{2}$" }
        region:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}-[A-Z0-9]{1,3}$"

    UpdateCountryRequest:
      type: object
      required: [country]
      properties:
        country: { type: string, pattern: "^[A-Z]{2}$" }
        region:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}-[A-Z0-9]{1,3}$"

    UpdateTimezoneRequest:
      type: object
      required: [timezone]
      properties:
        timezone:
          type: string
          example: Asia/Seoul
          description: IANA timezone identifier

    # ── Auth Response ──────────────────────────────────────────────────────
    TokenResponse:
      type: object
      required: [accessToken]
      properties:
        accessToken: { type: string }

    UserResponse:
      type: object
      required: [id, email, country, timezone]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        country:
          type: string
          pattern: "^[A-Z]{2}$"
          example: KR
        region:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}-[A-Z0-9]{1,3}$"
          example: null
        timezone:
          type: string
          example: Asia/Seoul
          description: IANA timezone identifier — AI 자동 요약은 이 tz 기준 "현지 새벽 1시"에 트리거됨

    ApiResponseToken:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TokenResponse" }

    ApiResponseUser:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/UserResponse" }

    # ── Todo ───────────────────────────────────────────────────────────────
    TodoCreateRequest:
      type: object
      required: [title, date_key]
      properties:
        title: { type: string }
        date_key: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        description: { type: string, default: "" }
        status:
          $ref: "#/components/schemas/TodoStatus"
          default: not-start

    TodoUpdateRequest:
      type: object
      properties:
        title: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TodoStatus", nullable: true }
        description: { type: string, nullable: true }
        date_key:
          { type: string, pattern: '^\d{4}-\d{2}-\d{2}$', nullable: true }

    TodoResponse:
      type: object
      required:
        [
          id,
          user_id,
          title,
          status,
          date_key,
          description,
          completed,
          created_at,
        ]
      properties:
        id: { type: string }
        user_id: { type: string }
        title: { type: string }
        status: { $ref: "#/components/schemas/TodoStatus" }
        date_key: { type: string }
        description: { type: string }
        completed: { type: boolean, description: 'status == "done"' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }

    ApiResponseTodo:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TodoResponse" }

    ApiResponseTodoList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/TodoResponse" }

    # ── Entry ──────────────────────────────────────────────────────────────
    EntryCreateRequest:
      type: object
      required: [date_key, title]
      properties:
        date_key: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        title: { type: string }
        content: { type: string, default: "" }
        retro_type:
          $ref: "#/components/schemas/RetroType"
          default: daily

    EntryUpsertRequest:
      $ref: "#/components/schemas/EntryCreateRequest"

    EntryResponse:
      type: object
      required: [id, user_id, date_key, title, content, retro_type, created_at]
      properties:
        id: { type: string }
        user_id: { type: string }
        date_key: { type: string }
        title: { type: string }
        content: { type: string }
        retro_type: { $ref: "#/components/schemas/RetroType" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    ApiResponseEntry:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EntryResponse" }

    ApiResponseEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/EntryResponse" }

    # ── Summary ────────────────────────────────────────────────────────────
    SummaryContentResponse:
      type: object
      properties:
        achievements: { type: array, items: { type: string } }
        challenges: { type: array, items: { type: string } }
        learnings: { type: array, items: { type: string } }
        next_focus: { type: array, items: { type: string } }

    SummaryResponse:
      type: object
      required:
        [
          id,
          user_id,
          summary_type,
          period_start,
          period_end,
          status,
          created_at,
        ]
      properties:
        id: { type: string }
        user_id: { type: string }
        summary_type: { $ref: "#/components/schemas/SummaryType" }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        status: { $ref: "#/components/schemas/SummaryStatus" }
        content:
          $ref: "#/components/schemas/SummaryContentResponse"
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    ApiResponseSummary:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SummaryResponse" }

    ApiResponseSummaryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/SummaryResponse" }

    # ── Notification ───────────────────────────────────────────────────────
    NotificationResponse:
      type: object
      required: [id, type, category, title, message, is_read, created_at]
      properties:
        id: { type: string }
        type: { $ref: "#/components/schemas/NotificationType" }
        category: { $ref: "#/components/schemas/NotificationCategory" }
        title: { type: string }
        message: { type: string }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }

    ApiResponseNotificationList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/NotificationResponse" }

    # ── Settings ───────────────────────────────────────────────────────────
    UpdateSettingsRequest:
      type: object
      properties:
        locale:
          type: string
          maxLength: 10
          default: ko
        autoSummaryWeekly: { type: boolean, default: false }
        autoSummaryMonthly: { type: boolean, default: false }
        autoSummaryYearly: { type: boolean, default: false }
        notificationRetentionDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 30
        lastScheduleCheckAt:
          type: string
          format: date-time
          nullable: true

    SettingsResponse:
      type: object
      required:
        [
          locale,
          autoSummaryWeekly,
          autoSummaryMonthly,
          autoSummaryYearly,
          notificationRetentionDays,
        ]
      properties:
        locale: { type: string }
        autoSummaryWeekly: { type: boolean }
        autoSummaryMonthly: { type: boolean }
        autoSummaryYearly: { type: boolean }
        notificationRetentionDays: { type: integer }
        lastScheduleCheckAt:
          type: string
          format: date-time
          nullable: true

    ApiResponseSettings:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SettingsResponse" }

    # ── GitHub Repository ──────────────────────────────────────────────────
    LinkRepositoryRequest:
      type: object
      required: [githubRepoId]
      properties:
        githubRepoId:
          type: integer
          format: int64
          minimum: 1
          description: GitHub의 numeric repository ID

    RepositoryResponse:
      type: object
      required:
        [
          id,
          githubRepoId,
          owner,
          name,
          fullName,
          isPrivate,
          defaultBranch,
          htmlUrl,
          createdAt,
        ]
      properties:
        id:
          {
            type: string,
            description: 백엔드에서 발급한 연결 ID (`ghrepo_...`),
          }
        githubRepoId: { type: integer, format: int64 }
        owner: { type: string }
        name: { type: string }
        fullName: { type: string, example: octocat/Hello-World }
        isPrivate: { type: boolean }
        defaultBranch: { type: string, example: main }
        htmlUrl: { type: string, format: uri }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    AvailableRepositoryResponse:
      type: object
      required:
        [githubRepoId, owner, name, fullName, isPrivate, defaultBranch, htmlUrl]
      properties:
        githubRepoId: { type: integer, format: int64 }
        owner: { type: string }
        name: { type: string }
        fullName: { type: string }
        isPrivate: { type: boolean }
        defaultBranch: { type: string }
        htmlUrl: { type: string, format: uri }

    ApiResponseRepository:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/RepositoryResponse" }

    ApiResponseRepositoryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/RepositoryResponse" }

    ApiResponseAvailableRepoList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                { $ref: "#/components/schemas/AvailableRepositoryResponse" }
