  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARIES (AI 요약)
  # ════════════════════════════════════════════════════════════════════════════

  /summaries/generate:
    post:
      tags: [summaries]
      summary: AI 요약 생성 요청 (비동기)
      description: |
        Celery worker(`ai_tasks` 큐, priority=9)로 요약 작업을 enqueue하고 **즉시 202를 반환**한다.

        - 같은 기간에 PENDING/IN_PROGRESS 요약이 있으면 `409 RETRO_SUMMARY_ALREADY_IN_PROGRESS` 반환
        - COMPLETED 요약이 있으면 그대로 반환 (재실행하지 않음)
        - FAILED 요약은 자동으로 PENDING 리셋 후 재실행
        - Gemini 호출은 rate_limit `60/min` 적용
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
        - in: query
          name: periodStart
          schema: { type: string, format: date }
          description: |
            생략 시 직전 기간 자동 계산 (지난 주 월~일 / 지난 달 / 작년).
            지정 시 해당 기간의 시작일 (월요일/1일/1월1일).
      responses:
        "202":
          description: 요청 접수
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
      x-error-codes:
        - RETRO_SUMMARY_ALREADY_IN_PROGRESS
        - RETRO_SUMMARY_INVALID_STATE

  /summaries:
    get:
      tags: [summaries]
      summary: 요약 목록 조회 (타입별)
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummaryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /summaries/{summary_id}:
    parameters:
      - $ref: "#/components/parameters/SummaryIdPath"

    get:
      tags: [summaries]
      summary: 단일 요약 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - RETRO_SUMMARY_NOT_FOUND

  /summaries/{summary_id}/stream:
    parameters:
      - $ref: "#/components/parameters/SummaryIdPath"

    get:
      tags: [summaries]
      summary: 요약 완료 SSE 스트림
      description: |
        Celery worker가 요약 처리를 완료할 때까지 대기하며, 완료 시 단일 SSE 이벤트를 전송하고 종료한다.

        - **타임아웃**: 5분 (이후 `{"status": "timeout"}` 전송)
        - 이미 완료/실패 상태면 즉시 이벤트 전송 후 종료

        ### 이벤트 페이로드
        ```
        data: {"status": "completed", "summary_id": "summ_..."}
        data: {"status": "failed",    "summary_id": "summ_..."}
        data: {"status": "timeout",   "summary_id": "summ_..."}
        data: {"status": "error",     "error": "<ERROR_CODE>"}
        ```
      responses:
        "200":
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                example: 'data: {"status":"completed","summary_id":"summ_abc"}\n\n'
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS
  # ════════════════════════════════════════════════════════════════════════════

