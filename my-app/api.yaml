openapi: 3.0.3

info:
  title: ARCHIVE API
  version: 1.0.0
  description: |
    **ARCHIVE-BE** — 개인 생산성 및 회고 관리 백엔드 API.

    Clean Architecture 기반 (Domain → Application → Infrastructure → Presentation).

    ### 인증 방식
    - **Access Token**: `Authorization: Bearer <JWT>` 헤더 (만료 15분)
    - **Refresh Token**: `refresh_token` HttpOnly Cookie (만료 7일, `Secure`, `SameSite=Lax`)

    ### 공통 응답 포맷
    모든 응답은 아래 래퍼를 사용한다.
    ```json
    { "status": "success" | "accepted" | "error", "code": "OK", "data": { ... } }
    ```
    에러 응답은 `data: null`이며 `details[]`가 추가된다.

    ### AI 요약 비동기 처리
    `POST /summaries/generate`는 `202 Accepted`만 반환한다.
    실제 결과는 Celery worker가 처리하며, 클라이언트는 `GET /summaries/{id}/stream` SSE로 완료 신호를 받는다.

servers:
  - url: http://localhost:8000/api/v1
    description: 로컬 개발 서버
  - url: https://api.archive.example.com/api/v1
    description: 운영 서버 (placeholder)

tags:
  - name: auth
    description: 회원가입·로그인·토큰·OAuth·프로필
  - name: todos
    description: 할 일(Todo) CRUD
  - name: entries
    description: 회고 엔트리(일·주·월·연) CRUD
  - name: summaries
    description: AI 회고 요약 (비동기 + SSE)
  - name: notifications
    description: 알림 목록·읽음 처리·SSE 스트림
  - name: settings
    description: 유저 환경설정 (자동 요약, 알림 보존 등)
  - name: github
    description: GitHub 저장소 연결·동기화 (OAuth access_token 재사용)
  - name: calendar
    description: Google Calendar 연결·동기화 (refresh_token 기반 백그라운드 갱신)

x-tagGroups:
  - name: Account
    tags: [auth, settings]
  - name: Retrospective
    tags: [entries, summaries]
  - name: Productivity
    tags: [todos, notifications]
  - name: Integrations
    tags: [github, calendar]

security:
  - BearerAuth: []

# ────────────────────────────────────────────────────────────────────────────────
paths:
  # ────────────────────────────────────────────────────────────────────────────────

  # ════════════════════════════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════════════════════════════

  /auth/email/verify/send:
    post:
      tags: [auth]
      summary: 이메일 인증 코드 발송
      description: 회원가입 전 이메일 소유 확인용 6자리 코드를 발송한다. 재발송 쿨다운 60초.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendVerificationRequest"
            example:
              email: user@example.com
      responses:
        "200":
          description: 코드 발송 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseEmpty"
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /auth/email/verify/confirm:
    post:
      tags: [auth]
      summary: 이메일 인증 코드 확인
      description: 발송된 6자리 코드를 검증하고 30분간 "인증 완료" 상태를 유지한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
            example:
              email: user@example.com
              code: "123456"
      responses:
        "200":
          description: 인증 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_2FA_CODE_INVALID

  /auth/password/reset/request:
    post:
      tags: [auth]
      summary: 비밀번호 재설정 요청 (이메일 발송)
      description: |
        이메일로 비밀번호 재설정 링크를 발송한다.

        ### 보안 정책
        - **이메일 enumeration 방지**: 등록 여부와 무관하게 항상 `200 OK`를 반환한다.
          (응답으로 "이 이메일이 가입되어 있는가"를 알 수 없게 함)
        - 내부 분기 (실패해도 클라이언트에 노출되지 않음):
          - 이메일이 DB에 없음 → silent skip
          - OAuth 전용 계정(비밀번호 없음) → silent skip
          - 60초 이내 재요청 → silent skip
        - 토큰 TTL: 30분, 1회용

        ### 흐름
        1. 사용자 POST `/auth/password/reset/request` { email }
        2. 메일 수신, 본문 링크 클릭 → FE의 `/reset-password?token=...` 페이지
        3. 사용자가 새 비밀번호 입력 → POST `/auth/password/reset/confirm`
        4. 모든 활성 세션 폐기 (모든 기기 강제 로그아웃)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
            example:
              email: user@example.com
      responses:
        "200":
          description: 항상 성공 응답 (실제 발송 여부와 무관)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /auth/password/reset/confirm:
    post:
      tags: [auth]
      summary: 비밀번호 재설정 확정
      description: |
        이메일로 받은 토큰 + 새 비밀번호로 갱신한다.

        성공 시 해당 사용자의 **모든 refresh token이 폐기**되어 다른 기기에서도 강제 로그아웃된다.
        클라이언트는 새 비밀번호로 다시 로그인해야 한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
            example:
              token: "abc123..."
              newPassword: NewStrongPass1!
              newPasswordConfirm: NewStrongPass1!
      responses:
        "200":
          description: 재설정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_PASSWORD_RESET_TOKEN_INVALID
        - AUTH_PASSWORD_RESET_TOKEN_EXPIRED
        - AUTH_PASSWORD_RESET_NOT_ALLOWED
        - USER_NOT_FOUND

  /auth/register:
    post:
      tags: [auth]
      summary: 회원가입
      description: |
        이메일 인증 완료 상태에서만 호출 가능.
        성공 시 access token은 body, refresh token은 HttpOnly Cookie로 발급된다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              kr:
                summary: 단일 tz 국가 (timezone 생략 가능)
                value:
                  {
                    email: user@example.com,
                    password: strongPass1!,
                    passwordConfirm: strongPass1!,
                    country: KR,
                  }
              us_la:
                summary: 다중 tz 국가 (timezone 필수)
                value:
                  {
                    email: user@example.com,
                    password: strongPass1!,
                    passwordConfirm: strongPass1!,
                    country: US,
                    timezone: America/Los_Angeles,
                  }
      responses:
        "201":
          description: 가입 성공
          headers:
            Set-Cookie:
              description: "`refresh_token` HttpOnly cookie (7d)"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_EMAIL_NOT_VERIFIED
        - USER_EMAIL_INVALID
        - USER_EMAIL_DUPLICATED
        - AUTH_COUNTRY_INVALID
        - AUTH_COUNTRY_TIMEZONE_REQUIRED

  /auth/login:
    post:
      tags: [auth]
      summary: 이메일 + 비밀번호 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: user@example.com
              password: strongPass1!
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: "`refresh_token` HttpOnly cookie (7d)"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }
        "429":
          $ref: "#/components/responses/RateLimited_429"
      x-error-codes:
        - AUTH_INVALID_CREDENTIALS
        - AUTH_LOGIN_RATE_LIMITED

  /auth/token/refresh:
    post:
      tags: [auth]
      summary: Access Token 재발급
      description: |
        `refresh_token` Cookie를 사용해 새 access token + 새 refresh token을 발급한다.
        rotation 방식으로 이전 refresh token은 즉시 폐기된다.
      security:
        - RefreshCookie: []
      responses:
        "200":
          description: 재발급 성공
          headers:
            Set-Cookie:
              description: "회전된 새 `refresh_token` Cookie"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
      x-error-codes:
        - AUTH_REFRESH_TOKEN_INVALID
        - AUTH_REFRESH_TOKEN_REVOKED
        - AUTH_REFRESH_TOKEN_REUSE_DETECTED

  /auth/sessions:
    get:
      tags: [auth]
      summary: 활성 세션 목록 조회
      description: |
        현재 사용자의 모든 활성 세션(로그인된 기기) 목록을 반환한다.
        `isCurrent` 가 true 인 항목이 이 요청을 보낸 세션이다.

        통신은 server-side trust anchor 정책에 따라 Redis 세션 레코드에서 직접 조회된다.
        각 세션의 device 메타데이터는 발급 시점 User-Agent 에서 파싱된 값이다.
      responses:
        "200":
          description: 활성 세션 목록
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSessionList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
    delete:
      tags: [auth]
      summary: 현재 세션 외 모든 세션 폐기 (다른 기기 전부 로그아웃)
      description: |
        현재 요청을 보낸 세션은 유지하고 다른 모든 세션을 즉시 폐기한다.
        다른 기기에서는 다음 refresh 시도 시 401.
      responses:
        "200":
          description: 폐기 완료
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRevokeOthers" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /auth/sessions/{sessionId}:
    delete:
      tags: [auth]
      summary: 단일 세션 폐기
      description: |
        특정 세션 하나만 폐기. 자신이 소유한 세션만 폐기 가능 (다른 사용자의 sessionId 는 404).
        현재 세션을 폐기하면 다음 요청부터 401.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 폐기 완료
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - AUTH_SESSION_NOT_FOUND

  /auth/logout:
    post:
      tags: [auth]
      summary: 로그아웃
      description: refresh token을 폐기하고 쿠키를 삭제한다.
      security:
        - BearerAuth: []
        - RefreshCookie: []
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /auth/me:
    get:
      tags: [auth]
      summary: 내 정보 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - USER_NOT_FOUND

    patch:
      tags: [auth]
      summary: 프로필 수정
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            example:
              display_name: 변경된 이름
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUpdateProfile" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"

  /auth/oauth/{provider}/authorize:
    get:
      tags: [auth]
      summary: OAuth 인증 시작 (로그인용 리다이렉트)
      description: |
        해당 provider의 OAuth 인증 페이지로 **302 Redirect**한다.
        프론트에서 이 URL을 새 창/팝업으로 열어 사용한다.

        **로그인용**: 로그인되지 않은 사용자가 호출. callback은 신규 사용자/기존 사용자 분기.
        이미 로그인된 사용자가 계정 연결만 추가하려면 `POST /auth/oauth/{provider}/link/init`를 사용.
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProviderPath"
      responses:
        "302":
          description: OAuth provider로 리다이렉트
          headers:
            Location:
              description: provider의 authorize URL
              schema: { type: string, format: uri }

  /auth/oauth/{provider}/link/init:
    post:
      tags: [auth]
      summary: OAuth 계정 연결 시작 (Bearer 인증 필수) — POST init 패턴
      description: |
        **이미 로그인된 사용자**가 해당 provider 계정을 자신의 계정에 추가 연결할 때
        사용. 응답의 `authorizeUrl`을 프론트에서 popup으로 직접 연다.

        ### 왜 POST init 인가
        - popup으로 GET 요청 시 `Authorization` 헤더를 실을 수 없어 기존 GET
          `link/authorize` 방식은 사용자 식별이 불가능했다.
        - POST 한 번으로 인증된 컨텍스트에서 state를 사전 발급 → 그 state가 포함된
          authorize URL을 popup으로 열면 보안과 식별 두 마리 토끼를 모두 잡는다.

        ### 흐름
        1. FE → `POST /auth/oauth/{provider}/link/init` (Bearer)
        2. BE: state 생성 + `link_user_id=current_user.id` 바인딩 → authorize URL 반환
        3. FE: `window.open(authorizeUrl)` → provider 동의 화면
        4. provider → 기존 callback URL (`/auth/oauth/{provider}/callback`) 로 redirect
        5. callback이 state 페이로드의 `link_user_id` 로 link 분기 자동 결정

        ### 정책
        - 한 사용자당 같은 provider 1개 연결만 허용
        - 같은 provider 계정이 다른 사용자에 이미 연결되어 있으면 `AUTH_OAUTH_ACCOUNT_ALREADY_LINKED` (409)
        - 같은 사용자가 같은 provider에 이미 다른 계정 연결되어 있으면 `AUTH_OAUTH_PROVIDER_ALREADY_LINKED` (409)
        - 동일 provider account 재요청 시 멱등 처리 (access_token만 갱신)

        ### 콜백 postMessage
        ```js
        { type: "oauth_linked", provider: "github" }
        ```
      parameters:
        - $ref: "#/components/parameters/OAuthProviderPath"
      responses:
        "200":
          description: authorize URL 반환
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseOAuthLinkInit" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth 콜백 (provider → 백엔드)
      description: |
        OAuth provider가 redirect로 호출하는 콜백. **클라이언트가 직접 호출하지 않는다.**

        응답은 HTML이며 팝업 창에서 `window.opener.postMessage()`로 부모 창에 결과를 전달한다.

        ### 분기 — state에 저장된 정보로 자동 결정
        - **기존 사용자 로그인** → `oauth_success` + access token + `refresh_token` HttpOnly Cookie
        - **신규 사용자** (OAuth 첫 사용) → `oauth_onboarding_required` + `onboarding_token` HttpOnly Cookie (TTL 30분).
          FE는 `/onboarding` 페이지로 이동해 `POST /auth/oauth/onboarding`에서 국가 정보를 추가 입력해 가입을 완료한다.
        - **계정 연결(link)** (state에 `link_user_id` 포함) → `oauth_linked` (새 토큰 발급 없음). FE는 settings 페이지로 복귀.

        ```js
        // 기존 사용자 로그인
        { type: "oauth_success", access_token: "..." }
        // 신규 사용자
        { type: "oauth_onboarding_required" }
        // 계정 연결 완료
        { type: "oauth_linked", provider: "github" }
        // 실패
        { type: "oauth_error", error: "<ERROR_CODE>" }
        ```
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProviderPath"
        - in: query
          name: code
          schema: { type: string }
          description: provider가 발급한 인가 코드
        - in: query
          name: state
          schema: { type: string }
          description: CSRF 방지용 state (initiate 시 발급된 값)
        - in: query
          name: error
          schema: { type: string }
          description: provider가 에러를 반환한 경우의 코드
      responses:
        "200":
          description: HTML 응답 (postMessage 스크립트 포함)
          headers:
            Set-Cookie:
              description: |
                기존 사용자 → `refresh_token` HttpOnly Cookie (7d)
                신규 사용자 → `onboarding_token` HttpOnly Cookie (30min)
              schema: { type: string }
          content:
            text/html:
              schema: { type: string }
      x-error-codes:
        - AUTH_OAUTH_STATE_INVALID
        - AUTH_OAUTH_ACCOUNT_ALREADY_LINKED
        - AUTH_OAUTH_PROVIDER_ALREADY_LINKED

  /auth/oauth/onboarding:
    post:
      tags: [auth]
      summary: OAuth 신규 사용자 온보딩 완료
      description: |
        OAuth 콜백 단계에서 `onboarding_token` HttpOnly Cookie를 받은 신규 사용자가 국가 정보를
        추가 입력해 가입을 완료한다.

        - **단일 tz 국가** (예: KR, JP, FR): `timezone` 생략 가능 — BE 가 자동 결정
        - **다중 tz 국가** (예: US, RU, BR, AU, CA): `timezone` 필수 (IANA tz 문자열)
        - 국가별 사용 가능한 timezone 목록은 `GET /settings/countries/{code}/timezones` 로 조회
        - 성공 시 `onboarding_token` Cookie 삭제 + `refresh_token` Cookie + access token body
      security:
        - OnboardingCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardingCompleteRequest" }
            examples:
              korea:
                summary: 한국 (단일 tz)
                value: { country: KR }
              us_la:
                summary: 미국 LA (다중 tz)
                value: { country: US, timezone: America/Los_Angeles }
              brazil_sp:
                summary: 브라질 상파울루 (다중 tz)
                value: { country: BR, timezone: America/Sao_Paulo }
      responses:
        "201":
          description: 가입 완료
          headers:
            Set-Cookie:
              description: "`refresh_token` HttpOnly cookie (7d) + `onboarding_token` 삭제"
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseToken" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_ONBOARDING_TOKEN_INVALID
        - AUTH_ONBOARDING_TOKEN_EXPIRED
        - AUTH_COUNTRY_INVALID
        - AUTH_COUNTRY_TIMEZONE_REQUIRED
        - USER_EMAIL_DUPLICATED

  # ════════════════════════════════════════════════════════════════════════════
  # TODOS
  # ════════════════════════════════════════════════════════════════════════════

  /todos:
    get:
      tags: [todos]
      summary: 할 일 목록 조회
      description: |
        쿼리 파라미터에 따라 모드가 결정된다:
        - `dateKey` 단독 → 해당 일자의 할 일
        - `from` + `to` → 기간 범위 조회 (최대 62일, 초과 시 422)
        - 둘 다 없으면 빈 배열 반환

        Google Calendar 를 연결한 사용자의 경우, Google 에서 직접 만든 이벤트도
        pull-sync 시 수정 가능한 Todo 로 승격되어(`calendarLinked: true`) 이 목록에
        함께 포함된다 — 더 이상 별도 `events` 리스트가 없다(과거 `{ todos, events }`
        형태였던 `TodosWithEventsResponse` 는 폐기, `GET /calendar/events` 도 deprecated).
        마지막 동기화가 stale 하면 이 조회 시점에 Google 과 온디맨드 증분 동기화가
        일어날 수 있다(약간의 추가 지연).

        **뷰 단위 조회 권장**: 일 뷰(`dateKey`), 주 뷰(`from`+7일), 월 뷰(`from`+31일)
        단위로 요청해야 응답 크기가 일정하게 유지된다.
      parameters:
        - in: query
          name: dateKey
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
          example: "2026-05-31"
        - in: query
          name: from
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: to
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseTodoList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422":
          $ref: "#/components/responses/ValidationError_422"

    post:
      tags: [todos]
      summary: 할 일 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TodoCreateRequest" }
            example:
              title: 회의 자료 준비
              date_key: "2026-05-31"
              description: 회의 슬라이드 작성
              status: not-start
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseTodo" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /todos/{todo_id}:
    parameters:
      - $ref: "#/components/parameters/TodoIdPath"

    patch:
      tags: [todos]
      summary: 할 일 수정 (부분)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TodoUpdateRequest" }
            example:
              status: done
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseTodo" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - TODO_NOT_FOUND
        - TODO_ALREADY_COMPLETED
        - TODO_ALREADY_IN_PROGRESS

    delete:
      tags: [todos]
      summary: 할 일 삭제
      description: >
        연동돼 있던 Google Calendar 이벤트가 있으면 best-effort 로 함께 삭제된다
        (백그라운드 task, 응답을 지연시키지 않음).
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - TODO_NOT_FOUND

  /todos/{todo_id}/calendar-link:
    parameters:
      - $ref: "#/components/parameters/TodoIdPath"

    post:
      tags: [todos]
      summary: 할 일을 Google Calendar 에 연동 (사이드바 '캘린더에 추가')
      description: >
        기존 할 일을 Google Calendar 에 push 예약한다(비동기 반영). 이미 연동돼
        있어도 멱등(재-push=update). 캘린더 미연결 사용자는 백그라운드에서 no-op.
      responses:
        "200":
          description: 연동 예약 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - TODO_NOT_FOUND

    delete:
      tags: [todos]
      summary: Google Calendar 연동만 해제 (사이드바 '캘린더에서 빼기')
      description: >
        할 일은 유지한 채 연동된 Google Calendar 이벤트만 삭제 예약한다(비동기).
        미연동 할 일이면 no-op 으로 성공 반환.
      responses:
        "200":
          description: 연동 해제 예약 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - TODO_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # ENTRIES (회고 엔트리)
  # ════════════════════════════════════════════════════════════════════════════

  /entries:
    get:
      tags: [entries]
      summary: 회고 엔트리 목록 조회
      description: |
        회고 종류·기간 필터로 조회한다.

        - `retroType` 만 지정(`from`/`to` 없음) → **오늘 기준 최근 30일만** 반환한다
          (초기 하이드레이션용 기본 범위 — 예전엔 무제한 전체 이력을 반환했음).
          그 이전 이력이 필요하면 `from`+`to` 를 명시하거나 `GET /entries/paginated` 사용.
        - `from`+`to` 지정 → 해당 기간 전체 반환. 최대 366일, 초과 시 422.
        - 날짜 포맷이 `YYYY-MM-DD` 가 아니면 422.
        - 둘 다 없으면 빈 배열.
      parameters:
        - in: query
          name: retroType
          schema: { $ref: "#/components/schemas/RetroType" }
        - in: query
          name: from
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: to
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422":
          $ref: "#/components/responses/ValidationError_422"

    post:
      tags: [entries]
      summary: 회고 엔트리 생성
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EntryCreateRequest" }
            example:
              date_key: "2026-05-31"
              title: 5월 31일 회고
              content: 오늘은 ...
              retro_type: daily
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - JOURNAL_ENTRY_ALREADY_EXISTS

  /entries/paginated:
    get:
      tags: [entries]
      summary: 회고록 목록 페이지 (페이지네이션)
      description: |
        전체 이력을 최신순으로 페이지네이션 조회한다. `GET /entries`(초기 하이드레이션용,
        최근 30일 기본)와 달리 과거 전체 이력을 훑어보는 회고록 목록 페이지용.

        - `retroType` **필수**. daily 는 `journal_entries`, weekly/monthly/annual 은
          `retro_summaries`(AI 생성 요약)에서 조회한다 — 소스 테이블이 달라 타입 없이
          섞어서 조회할 수 없다.
        - 응답 각 항목의 `isSummary`(요약 여부) + `status`(요약 전용:
          pending/in_progress/completed/failed, entry 는 null)로 출처 구분.
        - `githubPush` 는 이 엔드포인트에서 항상 키가 존재한다(nullable) — `GET /entries`
          와 달리 비개발자/GitHub 미연결 사용자도 키 자체는 오고 값만 null.
        - `q` 로 키워드 검색 가능. daily 는 `content_tsv` full-text, summary 는
          `content`/`edited_content` ILIKE.
        - `from`+`to` 로 기간 필터 가능 (둘 다 지정해야 적용, 하나만 있으면 무시). 최대
          366일, 초과 시 422. daily 는 `date_key` 가 범위 안에 있는 것만. weekly/monthly/
          annual 은 **겹침(overlap) 기준** — 요약 기간이 `from`~`to` 와 조금이라도 겹치면
          포함한다(엄격 포함 아님). 예: `from=2026-06-01&to=2026-06-30` 조회 시 5/28~6/3
          주간 요약도 포함됨(그 주가 6월과 겹치므로).
      parameters:
        - in: query
          name: retroType
          required: true
          schema: { $ref: "#/components/schemas/RetroType" }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: size
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
        - in: query
          name: q
          schema: { type: string, minLength: 1 }
        - in: query
          name: from
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: to
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntryPage" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422":
          $ref: "#/components/responses/ValidationError_422"

  /entries/{entry_id}:
    parameters:
      - $ref: "#/components/parameters/EntryIdPath"

    get:
      tags: [entries]
      summary: 단일 엔트리 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - JOURNAL_ENTRY_NOT_FOUND

    put:
      tags: [entries]
      summary: 엔트리 Upsert
      description: |
        존재하면(본인 소유) 수정, id가 전역 미존재면 생성한다 (idempotent).
        id가 이미 다른 사용자 소유로 존재하면 404 (BOLA 방지 — 타 유저 엔트리 탈취 차단).
        생성 시 (date_key, retroType) 조합이 이미 존재하면 409.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EntryUpsertRequest" }
      responses:
        "200":
          description: Upsert 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEntry" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - JOURNAL_ENTRY_NOT_FOUND
        - JOURNAL_ENTRY_ALREADY_EXISTS

    delete:
      tags: [entries]
      summary: 엔트리 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - JOURNAL_ENTRY_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # SEARCH (nav 통합검색)
  # ════════════════════════════════════════════════════════════════════════════

  /search:
    get:
      tags: [search]
      summary: 통합검색 (Todo + 회고 daily entry)
      description: |
        Todo(`title`)와 회고 daily entry(`title`+`content`)를 동시 검색한다. 두 리소스의
        관련도 점수는 서로 비교 불가능해 하나로 합치지 않고 타입별로 나눠 반환한다.
        weekly/monthly/annual 요약은 이 검색에 포함되지 않는다(회고록 목록 페이지의
        `GET /entries/paginated?q=` 사용).
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 5 }
          description: 타입별(todos/entries 각각) 최대 반환 개수
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseGlobalSearch" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422":
          $ref: "#/components/responses/ValidationError_422"

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARIES (AI 요약)
  # ════════════════════════════════════════════════════════════════════════════

  /summaries/generate:
    post:
      tags: [summaries]
      summary: AI 요약 생성 요청 (비동기)
      description: |
        Celery worker(`ai_tasks` 큐, priority=9)로 요약 작업을 enqueue하고 **즉시 202를 반환**한다.

        - 같은 기간에 PENDING/IN_PROGRESS 요약이 있으면 `409 RETRO_SUMMARY_ALREADY_IN_PROGRESS` 반환
        - COMPLETED 요약이 있으면 그대로 반환 (재실행하지 않음). `force=true` 면 강제 재생성.
        - FAILED 요약은 자동으로 PENDING 리셋 후 재실행
        - Gemini 호출은 rate_limit `60/min` 적용

        ### 사용자별 호출 한도 (7일 sliding window)
        실제로 AI 호출이 enqueue 되는 경로(신규 / FAILED 재시도 / force 재생성)에만 카운트.
        COMPLETED 그대로 반환 / 409 충돌은 카운트하지 않는다.

        | type | 한도 / 7일 |
        |---|---|
        | weekly  | 10 |
        | monthly |  3 |
        | annual  |  1 |

        한도 초과 시 `429 RETRO_SUMMARY_RATE_LIMIT_EXCEEDED` 반환. 응답 `details[0]` 에
        `{ summaryType, limit, windowSeconds, retryAfterSeconds }` 포함.
        FE 가 사전에 잔여 한도를 알고 싶으면 `GET /summaries/usage` 호출.

        ### 데이터 소스 정책 (수동·자동 동일)
        - **weekly** : 그 주의 일일 회고(JournalEntry) + 그 주의 **`in-progress` / `done` 상태 todo** 직접 사용.
          `not-start` todo 는 제외.
        - **monthly**: **하이브리드** — 주마다 weekly 요약 있으면 그것 사용,
          없으면 그 주 entries 첨부. weekly 요약이 있더라도 갱신 이후 추가된 entry 가
          있으면 보강(방식 B) — 데이터 손실 0.
        - **annual** : **2단계 하이브리드** — 월마다 monthly 요약 있으면 그것,
          없으면 그 달의 weekly 요약들로 보강. 둘 다 없으면 해당 월 스킵.

        ### 프롬프트 / 출력 언어 정책
        - 시스템 지시문은 **영어**로 작성 — LLM 안정성 확보.
        - 출력 콘텐츠 언어는 사용자 `locale` (PUT /settings) 기준 (`ko` → 한국어, `en` → 영어, 그 외 best-effort).
        - JSON 키는 항상 영어 (`achievements`, `challenges`, `learnings`, `next_focus`). Gemini `response_schema` 로 형태 강제.
        - 사용자 템플릿(`autoSummaryTemplates.{weekly|monthly|annual}`)은 스타일 가이드로만 적용되며
          `<USER_TEMPLATE>` 태그로 격리. JSON 스키마 / 언어 규칙은 사용자 템플릿으로 변경 불가 (시스템 메시지가 명시 거부).

        ### 사전 점검 권장
        monthly/annual 생성 전에 `GET /summaries/readiness` 호출 권장 — 데이터가
        부족(`recommendation: insufficient`)하면 사용자에게 다이얼로그를 띄워
        확인 받기.
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
        - in: query
          name: periodStart
          schema: { type: string, format: date }
          description: |
            생략 시 직전 기간 자동 계산 (지난 주 월~일 / 지난 달 / 작년).
            지정 시 해당 기간의 시작일 (월요일/1일/1월1일).
        - in: query
          name: force
          schema: { type: boolean, default: false }
          description: |
            `true` 면 같은 기간의 COMPLETED 요약이 있어도 강제로 재생성한다 (status 리셋 후 enqueue).
            기본값 `false` — COMPLETED 면 기존 요약을 그대로 반환.
            rate limit 카운트 대상.
      responses:
        "202":
          description: 요청 접수 (신규 생성 / FAILED 재시도 / force 재생성)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "429":
          $ref: "#/components/responses/RateLimited_429"
      x-error-codes:
        - RETRO_SUMMARY_ALREADY_IN_PROGRESS
        - RETRO_SUMMARY_INVALID_STATE
        - RETRO_SUMMARY_RATE_LIMIT_EXCEEDED

  /summaries/usage:
    get:
      tags: [summaries]
      summary: 사용자별 AI 요약 생성 사용량 조회
      description: |
        `POST /summaries/generate` 의 7일 sliding window 사용량을 summary_type 별로 반환.

        FE 가 [회고 생성] 버튼의 활성/비활성, 잔여 횟수 표시, 다음 가능 시각 안내 등에 사용.

        한도가 0 인 type 도 응답에 포함된다 (`used == limit`). `retryAfterSeconds` 는
        한도가 남아 있으면 `0`, 초과 상태면 가장 오래된 사용량이 윈도우에서 빠지는 시각까지
        남은 초.
      responses:
        "200":
          description: 사용량
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummaryUsage" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /summaries/templates:
    get:
      tags: [summary-templates]
      summary: 사용자 AI 요약 템플릿 목록
      description: |
        지정 summary_type 의 사용자 템플릿 목록을 created_at 오름차순으로 반환.
        각 항목의 `isActive` 는 `user_settings.active_summary_template_ids[type]` 과
        ID 가 일치하는 단 1개만 true.
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
      responses:
        "200":
          description: 목록
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseSummaryTemplateList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
    post:
      tags: [summary-templates]
      summary: 사용자 AI 요약 템플릿 생성
      description: |
        지정 summary_type 에 새 템플릿 생성. 다음 정책 적용:
        - **이름 중복 금지** (같은 `user_id` + `summary_type` 안에서 unique). 위반 시 `409 RETRO_SUMMARY_TEMPLATE_NAME_DUPLICATED`.
        - **개수 한도**: 한 (user, type) 당 N 개 (기본 5, env `SUMMARY_TEMPLATE_MAX_PER_TYPE`).
          초과 시 `409 RETRO_SUMMARY_TEMPLATE_LIMIT_REACHED`. 응답 `details[0]` 에
          `{ summaryType, limit }`.
        - 생성된 템플릿은 기본적으로 비활성. 활성화하려면 `PUT /settings/auto-summary/active`.
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/CreateSummaryTemplateRequest" }
      responses:
        "201":
          description: 생성됨
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseSummaryTemplate" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "409":
          $ref: "#/components/responses/Conflict_409"
      x-error-codes:
        - RETRO_SUMMARY_TEMPLATE_NAME_DUPLICATED
        - RETRO_SUMMARY_TEMPLATE_LIMIT_REACHED

  /summaries/templates/{templateId}:
    get:
      tags: [summary-templates]
      summary: 단일 템플릿 조회
      parameters:
        - in: path
          name: templateId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseSummaryTemplate" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - RETRO_SUMMARY_TEMPLATE_NOT_FOUND
    patch:
      tags: [summary-templates]
      summary: 템플릿 수정 (이름·내용)
      description: |
        - 이름 변경 시 같은 (user, summary_type) 안에서 중복 금지.
        - summary_type 변경 불가 — 변경하려면 새 템플릿 생성 후 기존 삭제.
      parameters:
        - in: path
          name: templateId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/UpdateSummaryTemplateRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseSummaryTemplate" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
      x-error-codes:
        - RETRO_SUMMARY_TEMPLATE_NOT_FOUND
        - RETRO_SUMMARY_TEMPLATE_NAME_DUPLICATED
    delete:
      tags: [summary-templates]
      summary: 템플릿 삭제
      description: |
        **현재 활성으로 지정된 템플릿은 삭제할 수 없다** — 비활성화 후 삭제하거나
        다른 템플릿을 활성으로 바꾸어야 함. 활성 보호 위반 시 `409 RETRO_SUMMARY_TEMPLATE_IN_USE`.
      parameters:
        - in: path
          name: templateId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: 삭제됨
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
      x-error-codes:
        - RETRO_SUMMARY_TEMPLATE_NOT_FOUND
        - RETRO_SUMMARY_TEMPLATE_IN_USE

  /settings/auto-summary/active:
    put:
      tags: [summary-templates]
      summary: summary_type 별 활성 템플릿 설정
      description: |
        Body 에 명시된 필드만 갱신 — 미전송 필드는 변경 없음. 각 필드의 의미:
        - 문자열 → 해당 type 의 활성 ID 로 설정. 소유 / 타입 일치 검증 후 적용.
        - 명시적 `null` → 해당 type 비활성화 → 시스템 기본 템플릿 사용.

        활성 ID 가 가리키는 템플릿이 사라지면 (race 등) AI 자동 요약 생성 시점에
        시스템 기본으로 자동 fallback.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/SetActiveSummaryTemplatesRequest" }
            example:
              weekly: tmpl_01HXYZ...
              monthly: null
      responses:
        "200":
          description: ok — 갱신된 SettingsResponse
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSettings" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - RETRO_SUMMARY_TEMPLATE_NOT_FOUND

  /summaries/readiness:
    get:
      tags: [summaries]
      summary: 요약 생성 사전 점검 (entry 밀도 기반)
      description: |
        monthly/annual 요약을 생성하기 전에 사용자의 회고 **원천 데이터 밀도**를
        측정해 FE 가 "데이터 부족" 다이얼로그를 띄울지 결정하게 한다.

        - **측정 지표**: child summary 존재 여부 아님 — **entry 밀도** 기반
          - monthly: `expectedUnits` = 그 달의 일수, `coveredUnits` = entry 가 있는 unique 날짜 수
          - annual : `expectedUnits` = 12, `coveredUnits` = entry 가 있는 월 수
        - **임계값**: `completenessRatio < 0.7` 이면 `recommendation: "insufficient"`,
          이상이면 `"ok"`.
        - **weekly 는 지원 안 함** — 호출 시 `422 RETRO_SUMMARY_READINESS_UNSUPPORTED`

        ### 권장 FE 흐름
        1. 사용자가 [회고 생성] 클릭 → 이 API 호출
        2. `recommendation == "insufficient"` → 다이얼로그 띄우기
           ("entry 가 X일/30일 작성됨. 그대로 진행하시겠습니까?")
        3. 사용자가 "진행" → `POST /summaries/generate`
      parameters:
        - in: query
          name: type
          required: true
          schema:
            type: string
            enum: [monthly, annual]
          description: weekly 는 422 반환.
        - in: query
          name: periodStart
          schema: { type: string, format: date }
          description: 생략 시 직전 기간(지난 달 / 작년).
      responses:
        "200":
          description: 점검 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseSummaryReadiness" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422":
          $ref: "#/components/responses/ValidationError_422"
      x-error-codes:
        - RETRO_SUMMARY_READINESS_UNSUPPORTED

  /summaries:
    get:
      tags: [summaries]
      summary: 요약 목록 조회 (타입별)
      parameters:
        - in: query
          name: type
          required: true
          schema: { $ref: "#/components/schemas/SummaryType" }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummaryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /summaries/{summary_id}:
    parameters:
      - $ref: "#/components/parameters/SummaryIdPath"

    get:
      tags: [summaries]
      summary: 단일 요약 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - RETRO_SUMMARY_NOT_FOUND

    patch:
      tags: [summaries]
      summary: 요약 편집 (마크다운 오버라이드 저장/해제)
      description: |
        AI 가 생성한 요약을 사용자가 편집한 마크다운으로 덮어쓴다.
        AI 원본(content.sections)은 보존되며, `contentMarkdown` 을 null 로 보내면
        편집을 해제해 AI 원본으로 복귀한다(AI 재호출/rate limit 없음).
        status 제약은 없다 — 호출 시점의 요약을 그대로 저장한다.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SummaryEditRequest" }
      responses:
        "200":
          description: 편집 저장 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422":
          $ref: "#/components/responses/ValidationError_422"
      x-error-codes:
        - RETRO_SUMMARY_NOT_FOUND

  /summaries/{summary_id}/stream:
    parameters:
      - $ref: "#/components/parameters/SummaryIdPath"

    get:
      tags: [summaries]
      summary: 요약 완료 SSE 스트림
      description: |
        Celery worker가 요약 처리를 완료할 때까지 대기하며, 완료 시 단일 SSE 이벤트를 전송하고 종료한다.

        - **타임아웃**: 5분 (이후 `{"status": "timeout"}` 전송)
        - 이미 완료/실패 상태면 즉시 이벤트 전송 후 종료

        ### 이벤트 페이로드
        ```
        data: {"status": "completed", "summary_id": "summ_..."}
        data: {"status": "failed",    "summary_id": "summ_..."}
        data: {"status": "timeout",   "summary_id": "summ_..."}
        data: {"status": "error",     "error": "<ERROR_CODE>"}
        ```
      responses:
        "200":
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
                example: 'data: {"status":"completed","summary_id":"summ_abc"}\n\n'
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFICATIONS
  # ════════════════════════════════════════════════════════════════════════════

  /notifications/stream:
    get:
      tags: [notifications]
      summary: 알림 실시간 SSE 스트림
      description: |
        Redis pub/sub 채널 `notifications:{user_id}`를 구독하여 새 알림을 실시간 푸시한다.

        - **타임아웃**: 5분 (이후 `{"type": "timeout"}` 전송)
        - 페이로드는 `NotificationResponse`와 동일 + (`type`/`category` 포함)
        - **`category=="summary"` 알림(AI 요약 완료/실패)에 한해** 어떤 회고가
          갱신됐는지 식별할 수 있는 추가 필드가 포함된다. FE 는 이 이벤트로 해당
          회고를 타깃 refetch/patch 할 수 있다 (수동 생성은 `summaryId` 를 이미
          알고 있으므로 `/summaries/{id}/stream` 사용, 자동 생성은 이 채널이 유일):
          - `resource`: `"summary"` (요약 관련 이벤트 식별자)
          - `summaryId`: 갱신된 요약 ID
          - `summaryType`: `weekly` | `monthly` | `annual`
          - `summaryStatus`: `completed` | `failed`
          - `periodStart`, `periodEnd`: 요약 기간 (ISO date, 실패 시 일부 생략 가능)
        - **`resource=="todo"` 이벤트**: Celery worker가 todo의 Google Calendar
          push/연동해제 완료 시 전송하는 ephemeral 이벤트. **DB에 저장되지 않으며**
          FE가 알림 패널에 쌓지 않고 todo 상태 갱신에만 사용한다. 추가 필드:
          - `resource`: `"todo"`
          - `todo_id`: 대상 todo ID
          - `calendar_linked`: boolean
          - `calendar_push_status`: `"synced"` | `"failed"` | `null` (`null`은 연동 해제 완료)
      responses:
        "200":
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                generic:
                  summary: 일반 알림
                  value: 'data: {"id":"noti_abc","type":"success","category":"system","title":"...","message":"..."}\n\n'
                summaryCompleted:
                  summary: AI 요약 완료 (summary 메타 포함)
                  value: 'data: {"id":"noti_abc","type":"success","category":"summary","title":"주간 회고 요약 완료","message":"...","resource":"summary","summaryId":"sum_123","summaryType":"weekly","summaryStatus":"completed","periodStart":"2026-06-22","periodEnd":"2026-06-28"}\n\n'
                calendarPushSynced:
                  summary: 캘린더 push 완료
                  value: 'data: {"id":"notf_xyz","type":"success","category":"sync","resource":"todo","todo_id":"todo_abc","calendar_linked":true,"calendar_push_status":"synced","title":"","message":"","is_read":true,"created_at":"2026-07-06T12:00:00Z"}\n\n'
                calendarPushFailed:
                  summary: 캘린더 push 실패
                  value: 'data: {"id":"notf_xyz","type":"warning","category":"sync","resource":"todo","todo_id":"todo_abc","calendar_linked":false,"calendar_push_status":"failed","title":"","message":"","is_read":true,"created_at":"2026-07-06T12:00:00Z"}\n\n'
                calendarUnlinked:
                  summary: 캘린더 연동 해제 완료
                  value: 'data: {"id":"notf_xyz","type":"success","category":"sync","resource":"todo","todo_id":"todo_abc","calendar_linked":false,"calendar_push_status":null,"title":"","message":"","is_read":true,"created_at":"2026-07-06T12:00:00Z"}\n\n'
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /notifications:
    get:
      tags: [notifications]
      summary: 알림 목록 조회
      parameters:
        - in: query
          name: unreadOnly
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseNotificationList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    delete:
      tags: [notifications]
      summary: 알림 일괄 삭제
      parameters:
        - in: query
          name: readOnly
          schema: { type: boolean, default: false }
          description: true면 읽은 알림만 삭제, false면 전체 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /notifications/read-all:
    patch:
      tags: [notifications]
      summary: 모든 알림 읽음 처리
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /notifications/{notification_id}/read:
    parameters:
      - $ref: "#/components/parameters/NotificationIdPath"

    patch:
      tags: [notifications]
      summary: 단일 알림 읽음 처리
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - NOTIFICATION_NOT_FOUND

  /notifications/{notification_id}:
    parameters:
      - $ref: "#/components/parameters/NotificationIdPath"

    delete:
      tags: [notifications]
      summary: 단일 알림 삭제
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - NOTIFICATION_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # SETTINGS
  # ════════════════════════════════════════════════════════════════════════════

  /settings:
    get:
      tags: [settings]
      summary: 유저 설정 조회
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSettings" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

    put:
      tags: [settings]
      summary: 유저 설정 수정 (전체 교체)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingsRequest" }
            example:
              locale: ko
              autoSummaryWeekly: true
              autoSummaryMonthly: true
              autoSummaryYearly: false
              notificationRetentionDays: 30
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseSettings" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }

  /settings/country:
    patch:
      tags: [settings]
      summary: 국가 변경 — timezone 자동 결정 (단일 tz) / IANA tz 명시 (다중 tz)
      description: |
        사용자 국가를 변경하면 backend 가 country / timezone 조합으로 IANA tz 를 결정해 같이 저장한다.
        AI 자동 요약 트리거 시간(현지 1am)도 새 timezone 기준으로 자동 갱신된다.

        ### 입력 규칙
        - **단일 tz 국가** (예: KR, JP, FR — pytz country_timezones 옵션 1개): `timezone` 생략 가능
        - **다중 tz 국가** (예: US, RU, BR, AU, CA): `timezone` 필수 (IANA tz 문자열)
        - 국가별 옵션은 `GET /settings/countries/{code}/timezones` 로 조회
        - country 만 바꿔도 자동으로 새 tz 가 저장됨 (region 이라는 별도 입력 없음)
        - 단순 timezone 만 단독 변경하려면 `PATCH /settings/timezone` 사용

        ### 데이터 소스
        - 국가 목록: `pycountry` (ISO 3166-1 alpha-2, 249개)
        - 국가 → tz 매핑: `pytz.country_timezones` (CLDR-derived)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCountryRequest" }
            examples:
              korea: { value: { country: KR } }
              japan: { value: { country: JP } }
              us_la: { value: { country: US, timezone: America/Los_Angeles } }
              brazil: { value: { country: BR, timezone: America/Sao_Paulo } }
      responses:
        "200":
          description: 수정 성공 (timezone 포함된 user 응답)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_COUNTRY_INVALID
        - AUTH_COUNTRY_TIMEZONE_REQUIRED
        - USER_NOT_FOUND

  /settings/countries/{code}/timezones:
    get:
      tags: [settings]
      summary: 국가의 사용 가능한 IANA timezone 목록 조회
      description: |
        FE 가 국가 선택 시 호출해 timezone 드롭다운을 채운다.

        - `multi: false` → 단일 tz 국가 (timezones 길이 1). FE 가 timezone 입력 받지 않아도 됨
        - `multi: true`  → 다중 tz 국가. 사용자가 timezone 을 직접 선택해야 함

        데이터 소스: `pytz.country_timezones` (CLDR-derived). OS tzdata 업데이트 시 자동 반영.
      parameters:
        - name: code
          in: path
          required: true
          description: ISO 3166-1 alpha-2 국가 코드 (대소문자 무관)
          schema: { type: string, pattern: "^[A-Za-z]{2}$" }
      responses:
        "200":
          description: 국가의 timezone 옵션
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseCountryTimezones" }
              examples:
                kr:
                  {
                    value:
                      {
                        status: success,
                        code: OK,
                        data:
                          {
                            country: KR,
                            timezones: [Asia/Seoul],
                            multi: false,
                          },
                      },
                  }
                us:
                  {
                    value:
                      {
                        status: success,
                        code: OK,
                        data:
                          {
                            country: US,
                            timezones:
                              [
                                America/New_York,
                                America/Chicago,
                                America/Denver,
                                America/Los_Angeles,
                                "...",
                              ],
                            multi: true,
                          },
                      },
                  }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_COUNTRY_INVALID

  /settings/timezone:
    patch:
      tags: [settings]
      summary: Timezone 단독 변경 (country는 유지)
      description: |
        country를 바꾸지 않고 timezone만 별도로 override한다. 해외 출장/임시 거주 등의 케이스용.
        IANA 식별자(`Asia/Seoul`, `America/Los_Angeles` 등) 형식이어야 한다.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTimezoneRequest" }
            example:
              timezone: America/Los_Angeles
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseUser" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - AUTH_TIMEZONE_INVALID
        - USER_NOT_FOUND

  # ════════════════════════════════════════════════════════════════════════════
  # RETRO TEMPLATES
  # ════════════════════════════════════════════════════════════════════════════

  /templates:
    get:
      tags: [retro-templates]
      summary: 내 회고 템플릿 목록 조회
      description: >
        retro_type 쿼리 파라미터로 필터링 가능. 미지정 시 전체 반환.
        각 항목의 `isActive` 는 `user_settings.active_retro_template_ids[retro_type]` 과 비교해 결정.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: retro_type
          schema: { $ref: "#/components/schemas/RetroType" }
          required: false
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseRetroTemplateList" }
        "401": { $ref: "#/components/responses/Unauthorized_401" }
      x-error-codes: []
    post:
      tags: [retro-templates]
      summary: 커스텀 회고 템플릿 생성
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: retro_type
          schema: { $ref: "#/components/schemas/RetroType" }
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RetroTemplateCreateRequest" }
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRetroTemplate" }
        "401": { $ref: "#/components/responses/Unauthorized_401" }
        "409":
          description: 같은 retro_type 내 이름 중복
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
      x-error-codes:
        - TEMPLATE_NAME_DUPLICATED

  /templates/active:
    put:
      tags: [retro-templates]
      summary: 활성 회고 템플릿 변경
      description: retro_type 별로 어떤 템플릿을 활성으로 사용할지 지정.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/SetActiveRetroTemplateRequest" }
      responses:
        "200":
          description: 변경 성공 — 새로 활성이 된 템플릿 반환
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRetroTemplate" }
        "401": { $ref: "#/components/responses/Unauthorized_401" }
        "404":
          description: 템플릿 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "422":
          description: retro_type 불일치
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
      x-error-codes:
        - TEMPLATE_NOT_FOUND
        - TEMPLATE_TYPE_MISMATCH

  /templates/{template_id}:
    parameters:
      - in: path
        name: template_id
        required: true
        schema: { type: string }
        example: tmpl_01HXYZ...
    patch:
      tags: [retro-templates]
      summary: 회고 템플릿 수정 (기본 템플릿 포함)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RetroTemplateUpdateRequest" }
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRetroTemplate" }
        "401": { $ref: "#/components/responses/Unauthorized_401" }
        "404":
          description: 템플릿 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: 이름 중복
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
      x-error-codes:
        - TEMPLATE_NOT_FOUND
        - TEMPLATE_NAME_DUPLICATED
    delete:
      tags: [retro-templates]
      summary: 커스텀 회고 템플릿 삭제
      description: >
        `is_default=true` 템플릿 삭제 시도 시 400.
        활성 템플릿 삭제 시 해당 retro_type의 기본 템플릿으로 자동 폴백 후 삭제.
      security: [{ bearerAuth: [] }]
      responses:
        "204":
          description: 삭제 성공
        "400":
          description: 기본 템플릿 삭제 불가
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401": { $ref: "#/components/responses/Unauthorized_401" }
        "404":
          description: 템플릿 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
      x-error-codes:
        - TEMPLATE_NOT_FOUND
        - TEMPLATE_DEFAULT_NOT_DELETABLE

  /templates/{template_id}/reset:
    parameters:
      - in: path
        name: template_id
        required: true
        schema: { type: string }
    post:
      tags: [retro-templates]
      summary: 기본 템플릿 본문을 표준값으로 복원
      description: >
        `is_default=true` 템플릿에만 허용.
        커스텀 템플릿에 호출 시 400(`TEMPLATE_DEFAULT_NOT_DELETABLE`).
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: 복원 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRetroTemplate" }
        "400":
          description: 커스텀 템플릿에는 reset 불가
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401": { $ref: "#/components/responses/Unauthorized_401" }
        "404":
          description: 템플릿 없음
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
      x-error-codes:
        - TEMPLATE_NOT_FOUND
        - TEMPLATE_DEFAULT_NOT_DELETABLE

  # ════════════════════════════════════════════════════════════════════════════
  # GITHUB
  # ════════════════════════════════════════════════════════════════════════════

  /github/connection:
    get:
      tags: [github]
      summary: GitHub 연결 상태 + push target + verified emails 보유 통합 조회
      description: |
        FE가 GitHub 화면 진입 시 한 번에 상태를 파악할 수 있도록 묶어 반환한다.

        - `connected`: GitHub OAuth 연결 + 토큰 유효성 검증 결과
        - `login`: GitHub username (connected=true일 때만)
        - `pushTargetRepositoryId`: 회고 push 대상 저장소 id (없으면 null)
        - `hasVerifiedEmails`: verified emails 캐시 보유 여부 — false 면 FE 가 사용자에게
          재연결 또는 GitHub email 등록 안내 (commit author 매칭 정확도 신호)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseConnectionStatus" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"

  /github/repositories/available:
    get:
      tags: [github]
      summary: GitHub에서 사용자 저장소 목록 조회
      description: |
        OAuth로 연결된 GitHub 계정의 모든 **public** 저장소 목록을 GitHub API에서 직접 가져온다.
        DB 저장은 하지 않음 (연결 후보 표시 용도).
        - `public_repo` scope 기준
        - 페이지네이션 자동 처리 (최대 2000개)
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseAvailableRepoList" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "429":
          $ref: "#/components/responses/RateLimited_429"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_RATE_LIMITED
        - GITHUB_API_UNAVAILABLE

  /github/repositories:
    get:
      tags: [github]
      summary: 연결된 저장소 목록 조회
      description: DB에 저장된, 현재 사용자가 연결한 GitHub 저장소 목록.
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepositoryList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"

    post:
      tags: [github]
      summary: 특정 저장소 1개 연결
      description: |
        `githubRepoId`로 식별되는 저장소를 사용자 계정에 연결한다.
        백엔드가 GitHub API에서 해당 저장소 메타데이터를 직접 조회해 저장 (위·변조 방지).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LinkRepositoryRequest" }
            example:
              githubRepoId: 1296269
      responses:
        "201":
          description: 연결 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepository" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "409":
          $ref: "#/components/responses/Conflict_409"
        "422": { $ref: "#/components/responses/ValidationError_422" }
        "429":
          $ref: "#/components/responses/RateLimited_429"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_REPOSITORY_NOT_FOUND
        - GITHUB_REPOSITORY_ALREADY_LINKED
        - GITHUB_RATE_LIMITED

    delete:
      tags: [github]
      summary: 모든 저장소 연결 해제
      description: 현재 사용자의 모든 GitHub 저장소 연결을 일괄 삭제.
      responses:
        "200":
          description: 삭제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"

  /github/repositories/sync-all:
    post:
      tags: [github]
      summary: GitHub 저장소 전체 일괄 연결 (1회 sync)
      description: |
        호출 시점의 GitHub 저장소 목록을 모두 가져와 일괄 연결한다 (idempotent upsert).
        이후 새로 생긴 repo는 사용자가 다시 호출해야 추가됨 (자동 갱신 없음).
        이미 연결된 저장소는 유지되며, 메타데이터가 바뀌었다면 갱신된다.
      responses:
        "200":
          description: sync 성공. 응답에는 현재 시점에 연결된 모든 저장소 목록이 담긴다.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepositoryList" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "429":
          $ref: "#/components/responses/RateLimited_429"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_RATE_LIMITED
        - GITHUB_API_UNAVAILABLE

  /github/repositories/{repository_id}:
    parameters:
      - in: path
        name: repository_id
        required: true
        schema: { type: string }
        example: ghrepo_01HXYZ...

    patch:
      tags: [github]
      summary: 저장소 역할 설정 (commit 읽기 on/off)
      description: |
        해당 저장소를 회고 화면의 "오늘의 커밋" 집계 대상으로 포함할지 토글한다.
        `commitReadEnabled=false`이면 `GET /github/commits` 응답에서 제외된다.
        Push 대상 지정은 별개 — `commitReadEnabled=false`인 저장소도 push 대상이 될 수 있다.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRepositoryRequest" }
            example:
              commitReadEnabled: false
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseRepository" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "404":
          $ref: "#/components/responses/NotFound_404"
        "422": { $ref: "#/components/responses/ValidationError_422" }
      x-error-codes:
        - GITHUB_REPOSITORY_NOT_FOUND

    delete:
      tags: [github]
      summary: 단일 저장소 연결 해제
      responses:
        "200":
          description: 해제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "404":
          $ref: "#/components/responses/NotFound_404"
      x-error-codes:
        - GITHUB_REPOSITORY_NOT_FOUND

  /github/commits:
    get:
      tags: [github]
      summary: 지정 날짜(기본=오늘)의 커밋 모음
      description: |
        사용자의 `commitReadEnabled=true` 저장소들에서 지정 날짜의 커밋을 모아
        시간 내림차순으로 반환한다.

        ### 규칙
        - **타임존**: 항상 `user.timezone` 기준. 별도 `tz` 쿼리 파라미터를 받지 않는다.
        - **모든 branch 조회**: 이전엔 GitHub 의 default branch only 가 default 동작이라
          feature/topic branch 의 commit 이 누락됐다. 신정책은 repo 마다 `list_branches`
          로 모든 branch 를 가져와 branch 별 commit 을 병렬 fetch → commit SHA 로 dedup.
          IDE 가 feature branch 로 push 한 commit 도 잡힘.
        - **본인 commit 매칭**: GitHub `?author=` 필터 미사용 — 그 repo 의 모든
          commit 을 받은 뒤 서버사이드 OR 필터로 본인 commit 만 추림.
          매칭 조건 (하나라도 true 면 본인):
          - `commit.author.login == user.github_login`
          - `commit.committer.login == user.github_login`
          - `commit.author.email ∈ verified_emails`
          - `commit.committer.email ∈ verified_emails`

          `verified_emails` 는 GitHub `/user/emails` 의 verified=true 만 캐시
          (`oauth_connections.provider_verified_emails`, lazy backfill). 사용자가
          gitbash 의 `git config user.email` 을 GitHub Settings → Emails 에 verified 로
          추가만 해두면 본인 commit 으로 자동 매칭.
        - **scope 정책**: OAuth scope = `user:email,public_repo`. **public repo only**
          (private repo 는 `repositories/available` 에 없고, 등록돼도 GitHub 404 →
          `failedRepositories` 에 포함).
        - **`date` 생략 시**: `user.timezone` 기준 오늘
        - **범위**: `[date 00:00, date+1 00:00)` 사용자 tz → UTC 변환 후 `since`/`until`
          (GitHub commits API 는 commit 의 **committer.date** 기준 필터링 — push 일시 아님)

        ### 에러 분류
        | 상황 | 동작 |
        |---|---|
        | GitHub 미연결 / 빈 토큰 | `GITHUB_CONNECTION_NOT_FOUND` (전체 400) |
        | OAuth 토큰 만료/폐기 | `GITHUB_TOKEN_INVALID` (전체 401) |
        | Rate limit | `GITHUB_RATE_LIMITED` (전체 429) |
        | GitHub 5xx | `GITHUB_API_UNAVAILABLE` (전체 503) |
        | 단일 저장소 404 (삭제/private+scope부족) | 해당 repo 만 skip → `failedRepositories[reason="not_found"]` |
        | 단일 저장소 기타 예외 | 해당 repo 만 skip → `failedRepositories[reason="unknown"]`. 백엔드 logger 에 warning |

        ### 응답
        - `commits`: 시간 내림차순. 비어 있어도 200.
        - `failedRepositories`: 부분 실패한 저장소 목록. FE 는 사용자에게 "X개 repo 에서
          커밋을 가져오지 못함" 식으로 표시 권장.
      parameters:
        - in: query
          name: date
          required: false
          schema: { type: string, format: date, pattern: '^\d{4}-\d{2}-\d{2}$' }
          example: "2026-06-12"
          description: 생략 시 user.timezone 기준 오늘
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseCommitList" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "422": { $ref: "#/components/responses/ValidationError_422" }
        "429":
          $ref: "#/components/responses/RateLimited_429"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_RATE_LIMITED
        - GITHUB_API_UNAVAILABLE

  /github/retrospectives/push:
    post:
      tags: [github]
      summary: 회고 마크다운을 push target 저장소에 commit/push
      description: |
        사용자가 작성한 회고 마크다운 본문을 push target 저장소의 정해진 경로에 commit한다.

        ### 파일 경로 규칙 (사용자 settings.locale 기반 i18n)
        | periodType | 폴더 (ko/en) | 파일명 (ko/en) |
        |---|---|---|
        | DAILY  | `일간/` / `daily/` | `2026-06-12 회고록.md` / `2026-06-12 retrospective.md` |
        | WEEKLY | `주간/` / `weekly/` | `2026-06 2주차 회고록.md` / `2026-06 week 2 retrospective.md` |
        | MONTHLY | `월간/` / `monthly/` | `2026-06 회고록.md` / `2026-06 retrospective.md` |
        | ANNUAL | `년간/` / `annual/` | `2026 회고록.md` / `2026 retrospective.md` |

        ### periodKey 형식
        - DAILY: `YYYY-MM-DD` (예: `2026-06-12`)
        - WEEKLY: `YYYY-MM-Wn` (n=1~6, majority-day 방식)
        - MONTHLY: `YYYY-MM`
        - ANNUAL: `YYYY`

        ### 동작
        - 같은 경로 파일이 있으면 **덮어쓰기**(update). 없으면 **생성**(create).
        - GitHub commit history가 자체 버전 관리 역할 — 덮어써도 이력 유지
        - 푸시 브랜치는 저장소의 `defaultBranch` 사용
        - 커밋 메시지는 사용자 locale로 자동 생성 (prefix `docs(retro):` 영문 고정)
        - 성공 시 백엔드가 `retrospective_pushes` 테이블에 (user_id, period_type, period_key)
          단위로 push 레코드를 upsert. 이후 `GET /entries`, `GET /entries/{id}`,
          `GET /summaries`, `GET /summaries/{id}` 응답에 `githubPush` 필드로 노출됨.
        - `periodType` 'YEARLY' (entry 측 표기) 가 들어오면 BE 가 'annual' 로 정규화해 저장.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushRetrospectiveRequest" }
            examples:
              daily_ko:
                summary: 일간 회고 (한국)
                value:
                  periodType: DAILY
                  periodKey: "2026-06-12"
                  contentMarkdown: '# 오늘의 회고\n...'
              weekly:
                summary: 주간 회고
                value:
                  periodType: WEEKLY
                  periodKey: "2026-06-W2"
                  contentMarkdown: '# 이번 주 회고\n...'
              monthly:
                summary: 월간 회고
                value:
                  periodType: MONTHLY
                  periodKey: "2026-06"
                  contentMarkdown: '# 6월 회고\n...'
              annual:
                summary: 년간 회고
                value:
                  periodType: ANNUAL
                  periodKey: "2026"
                  contentMarkdown: '# 2026년 회고\n...'
      responses:
        "201":
          description: push 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponsePushResult" }
        "400":
          $ref: "#/components/responses/BadRequest_400"
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "403":
          $ref: "#/components/responses/Forbidden_403"
        "422": { $ref: "#/components/responses/ValidationError_422" }
        "502":
          $ref: "#/components/responses/BadGateway_502"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GITHUB_CONNECTION_NOT_FOUND
        - GITHUB_TOKEN_INVALID
        - GITHUB_PUSH_TARGET_NOT_SET
        - GITHUB_REPOSITORY_NOT_LINKED
        - GITHUB_PUSH_FAILED
        - GITHUB_API_UNAVAILABLE

  # ── Google Calendar ────────────────────────────────────────────────────────
  /calendar/connection:
    get:
      tags: [calendar]
      summary: Google Calendar 연결 상태 조회
      description: |
        `connected=true` 이고 `needsReauth=true` 면 토큰이 무효해진 상태 →
        FE 가 재연결을 유도한다.
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseCalendarConnection" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
    delete:
      tags: [calendar]
      summary: Google Calendar 연결 해제
      description: 연결 정보와 저장된 모든 이벤트를 삭제한다.
      responses:
        "200":
          description: 해제 성공
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponseEmpty" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /calendar/connect/init:
    post:
      tags: [calendar]
      summary: Google Calendar 연결 시작
      description: |
        인증된 사용자가 호출. 응답의 `authorizeUrl` 을 FE 가 popup 으로 직접 연다.
        동의 완료 시 `/calendar/callback` 으로 돌아오며, callback HTML 의
        `window.opener.postMessage({ type: "calendar_connected" }, <frontend_origin>)`
        가 FE 로 전달된다. 실패 시 `{ type: "calendar_error", error }`.
      responses:
        "200":
          description: authorize URL 발급
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseCalendarConnectInit" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

  /calendar/callback:
    get:
      tags: [calendar]
      summary: Google OAuth callback (HTML postMessage)
      description: |
        Google 이 리다이렉트하는 콜백. Bearer 인증 없음(state 로 사용자 식별).
        결과를 `window.opener.postMessage` 로 FE 에 전달하는 HTML 을 반환한다.
        FE 가 직접 호출하지 않는다.
      security: []
      parameters:
        - in: query
          name: code
          schema: { type: string }
        - in: query
          name: state
          schema: { type: string }
        - in: query
          name: error
          schema: { type: string }
      responses:
        "200":
          description: postMessage HTML
          content:
            text/html:
              schema: { type: string }

  /calendar/sync:
    post:
      tags: [calendar]
      summary: 캘린더 수동 동기화 (이벤트 전용 반환)
      deprecated: true
      description: |
        **Deprecated**: Google Calendar 원본 이벤트는 이제 pull-sync 시 read-only
        CalendarEvent 가 아니라 수정 가능한 Todo 로 승격된다(`GET /todos` 참고).
        이 엔드포인트는 더 이상 새 이벤트를 반환하지 않으며(항상 빈 배열로 수렴),
        FE 는 `GET /todos` 로 이전해야 한다. 하위호환을 위해 당분간 유지.

        staleness 무시하고 Google 과 즉시 증분 동기화 후, 지정 범위의 캘린더 이벤트만 반환.
        from/to 는 현재 뷰의 날짜 범위를 넘긴다. 최대 62일 범위 허용.
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
          description: 조회 시작일 (YYYY-MM-DD)
        - in: query
          name: to
          required: true
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
          description: 조회 종료일 (YYYY-MM-DD, 최대 from+62일)
      responses:
        "200":
          description: 동기화 완료 — 해당 범위 캘린더 이벤트 목록
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseCalendarEventList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"
        "422":
          $ref: "#/components/responses/ValidationError_422"
        "503":
          $ref: "#/components/responses/ServiceUnavailable_503"
      x-error-codes:
        - GOOGLE_CALENDAR_REAUTH_REQUIRED
        - GOOGLE_CALENDAR_API_UNAVAILABLE

  /calendar/events:
    get:
      tags: [calendar]
      summary: 캘린더 이벤트 조회 (날짜 범위)
      deprecated: true
      description: |
        **Deprecated**: Google Calendar 원본 이벤트는 이제 pull-sync 시 read-only
        CalendarEvent 가 아니라 수정 가능한 Todo 로 승격된다. 이 엔드포인트는 더 이상
        새 이벤트를 반환하지 않으며(항상 빈 배열로 수렴), FE 는 `GET /todos` 로
        이전해야 한다. 하위호환을 위해 당분간 유지.

        `from`~`to` 범위의 Google Calendar 이벤트. 미연결 사용자는 빈 배열.
        stale 시 온디맨드 증분 동기화가 일어날 수 있다.
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        - in: query
          name: to
          required: true
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                { $ref: "#/components/schemas/ApiResponseCalendarEventList" }
        "401":
          $ref: "#/components/responses/Unauthorized_401"

# ────────────────────────────────────────────────────────────────────────────────
components:
  # ────────────────────────────────────────────────────────────────────────────────

  # ════════════════════════════════════════════════════════════════════════════
  securitySchemes:
    # ════════════════════════════════════════════════════════════════════════════
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "`Authorization: Bearer <access_token>` (만료 15분)"
    RefreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly · Secure · SameSite=Lax · Max-Age 7d
    OnboardingCookie:
      type: apiKey
      in: cookie
      name: onboarding_token
      description: |
        OAuth 신규 사용자 온보딩용 임시 토큰. HttpOnly · Secure · SameSite=Lax · Max-Age 30분.
        Redis에 `auth:onboarding:{token} → {provider, provider_user_id, email}` 형태로 적재됨.
        클라이언트가 `POST /auth/oauth/onboarding`에서 사용 후 즉시 삭제된다.

  # ════════════════════════════════════════════════════════════════════════════
  parameters:
    # ════════════════════════════════════════════════════════════════════════════
    TodoIdPath:
      in: path
      name: todo_id
      required: true
      schema: { type: string }
      example: todo_01HXYZ...
    EntryIdPath:
      in: path
      name: entry_id
      required: true
      schema: { type: string }
      example: entry_01HXYZ...
    SummaryIdPath:
      in: path
      name: summary_id
      required: true
      schema: { type: string }
      example: summ_01HXYZ...
    NotificationIdPath:
      in: path
      name: notification_id
      required: true
      schema: { type: string }
      example: noti_01HXYZ...
    OAuthProviderPath:
      in: path
      name: provider
      required: true
      schema: { $ref: "#/components/schemas/OAuthProvider" }

  # ════════════════════════════════════════════════════════════════════════════
  responses:
    # ════════════════════════════════════════════════════════════════════════════
    BadRequest_400:
      description: |
        잘못된 요청. 가능한 도메인 코드:
        - `RETRO_SUMMARY_INVALID_STATE` — 요약이 잘못된 상태
        - `AUTH_EMAIL_NOT_VERIFIED` — 이메일 미인증 상태에서 register 시도
        - `AUTH_OAUTH_STATE_INVALID` — OAuth state 불일치
        - `GITHUB_CONNECTION_NOT_FOUND` — GitHub 미연결
        - `GITHUB_PUSH_TARGET_NOT_SET` — push 대상 미설정
        - `GITHUB_REPOSITORY_NOT_LINKED` — push 대상이 연결되지 않은 저장소
        - `AUTH_PASSWORD_RESET_NOT_ALLOWED` — OAuth 전용 계정은 비밀번호 재설정 불가
        - `GOOGLE_CALENDAR_NOT_CONNECTED` — Google Calendar 미연결
        - `GOOGLE_CALENDAR_STATE_INVALID` — 캘린더 연결 OAuth state 검증 실패
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: RETRO_SUMMARY_INVALID_STATE
            data: null
            details: []
    Unauthorized_401:
      description: |
        인증 실패. 가능한 코드:
        - `AUTH_TOKEN_EXPIRED` — access token 만료 (**FE 자동 refresh 트리거**)
        - `AUTH_TOKEN_INVALID` — 토큰 누락 / 형식 오류 / 서명 불일치 / type mismatch
        - `AUTH_INVALID_CREDENTIALS` — 이메일/비밀번호 불일치
        - `AUTH_REFRESH_TOKEN_INVALID` / `AUTH_REFRESH_TOKEN_REVOKED` — refresh 실패
        - `AUTH_REFRESH_TOKEN_REUSE_DETECTED` — 폐기된 refresh token 재사용 감지(탈취 의심). 해당 사용자의 모든 세션이 즉시 폐기됨. 사용자에게 보안 알림 권장 후 재로그인 유도.
        - `AUTH_OAUTH_STATE_INVALID` — OAuth state 검증 실패
        - `AUTH_ONBOARDING_TOKEN_INVALID` — onboarding cookie 누락
        - `AUTH_ONBOARDING_TOKEN_EXPIRED` — onboarding TTL(30분) 만료
        - `AUTH_PASSWORD_RESET_TOKEN_INVALID` — 토큰 누락/형식 오류
        - `AUTH_PASSWORD_RESET_TOKEN_EXPIRED` — 토큰 TTL(30분) 만료 또는 이미 사용됨
        - `GITHUB_TOKEN_INVALID` — GitHub OAuth 토큰 만료/폐기 (FE는 GitHub OAuth 재인증 유도)
        - `GOOGLE_CALENDAR_REAUTH_REQUIRED` — Google Calendar refresh_token 무효 (FE는 캘린더 재연결 유도)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: AUTH_TOKEN_EXPIRED
            data: null
            details: []
    Forbidden_403:
      description: |
        권한 없음. 가능한 코드:
        - `DEVELOPER_ACCOUNT_REQUIRED` — GitHub 기능은 developer 계정 전용. `PATCH /auth/me`로 계정 유형 변경 필요.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: DEVELOPER_ACCOUNT_REQUIRED
            data: null
            details: []
    NotFound_404:
      description: |
        리소스를 찾을 수 없음. 가능한 코드:
        - 도메인별 NOT_FOUND (`TODO_NOT_FOUND`, `JOURNAL_ENTRY_NOT_FOUND`, `RETRO_SUMMARY_NOT_FOUND`, `NOTIFICATION_NOT_FOUND`, `USER_NOT_FOUND`, `GITHUB_REPOSITORY_NOT_FOUND`)
        - `AUTH_SESSION_NOT_FOUND` — 폐기 대상 sessionId 가 본인 소유가 아니거나 이미 만료됨
        - `RETRO_SUMMARY_TEMPLATE_NOT_FOUND` — 템플릿이 존재하지 않거나 본인 소유가 아니거나 활성 설정의 키와 summary_type 이 불일치
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: TODO_NOT_FOUND
            data: null
            details: []
    Conflict_409:
      description: |
        상태 충돌 (중복·이미 진행 중 등). 가능한 코드:
        - `USER_EMAIL_DUPLICATED` — 이메일 중복 가입
        - `TODO_ALREADY_COMPLETED` / `TODO_ALREADY_IN_PROGRESS`
        - `JOURNAL_ENTRY_ALREADY_EXISTS`
        - `RETRO_SUMMARY_ALREADY_IN_PROGRESS`
        - `GITHUB_REPOSITORY_ALREADY_LINKED`
        - `AUTH_OAUTH_ACCOUNT_ALREADY_LINKED` — link 시도한 OAuth 계정이 다른 사용자에 이미 연결됨
        - `AUTH_OAUTH_PROVIDER_ALREADY_LINKED` — 현재 사용자가 같은 provider에 다른 계정으로 이미 연결됨
        - `RETRO_SUMMARY_TEMPLATE_NAME_DUPLICATED` — 같은 (user, summary_type) 안에서 이름 중복
        - `RETRO_SUMMARY_TEMPLATE_LIMIT_REACHED` — (user, summary_type) 별 개수 한도 초과. `details[0]` 에 `{summaryType, limit}`
        - `RETRO_SUMMARY_TEMPLATE_IN_USE` — 활성 지정된 템플릿 삭제 시도
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: USER_EMAIL_DUPLICATED
            data: null
            details: []
    ValidationError_422:
      description: |
        요청 검증 실패. 두 가지 경로:
        - **Pydantic 스키마 에러** → `code: VALIDATION_ERROR`, `details` 에 field별 메시지
        - **도메인 검증 에러** (핸들러가 직접 반환) → 도메인 코드 사용:
          - `AUTH_COUNTRY_INVALID` — ISO 3166-1 미등록 국가, 또는 tz 데이터 없는 국가
          - `AUTH_COUNTRY_TIMEZONE_REQUIRED` — 다중 tz 국가에서 timezone 누락
          - `AUTH_TIMEZONE_INVALID` — IANA 형식 아니거나 해당 국가의 옵션 밖
          - `RETRO_SUMMARY_READINESS_UNSUPPORTED` — readiness 점검은 monthly/annual 만 지원, weekly 는 거부
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: VALIDATION_ERROR
            data: null
            details:
              - field: email
                message: value is not a valid email address
    RateLimited_429:
      description: |
        호출 한도 초과. 가능한 코드:
        - `GITHUB_RATE_LIMITED` — GitHub API rate limit 초과 (잠시 후 재시도)
        - `RETRO_SUMMARY_RATE_LIMIT_EXCEEDED` — 사용자별 AI 요약 생성 한도(7일 sliding window) 초과.
          `details[0]` 에 `{ summaryType, limit, windowSeconds, retryAfterSeconds }` 포함.
        - `AUTH_LOGIN_RATE_LIMITED` — 로그인 실패 누적으로 일시 차단(brute-force 방어, email+IP 고정 윈도우). 잠시 후 재시도.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: RETRO_SUMMARY_RATE_LIMIT_EXCEEDED
            data: null
            details:
              - summaryType: weekly
                limit: 10
                windowSeconds: 604800
                retryAfterSeconds: 12345
    BadGateway_502:
      description: |
        외부 서비스(GitHub) push 실패. sha 충돌 / 권한 / 네트워크 오류 등.
        FE는 사용자에게 "다시 시도" 안내. 자동 retry는 금지(중복 commit 위험).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: GITHUB_PUSH_FAILED
            data: null
            details: []
    ServiceUnavailable_503:
      description: |
        외부 서비스 일시적 장애. 가능한 코드:
        - `GITHUB_API_UNAVAILABLE` — GitHub API 장애
        - `GOOGLE_CALENDAR_API_UNAVAILABLE` — Google Calendar API 장애
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            status: error
            code: GITHUB_API_UNAVAILABLE
            data: null
            details: []

  # ════════════════════════════════════════════════════════════════════════════
  schemas:
    # ════════════════════════════════════════════════════════════════════════════

    # ── 공통 래퍼 ────────────────────────────────────────────────────────────
    ApiResponseEmpty:
      type: object
      required: [status, code, data]
      properties:
        status: { type: string, enum: [success, accepted] }
        code: { type: string, example: OK }
        data: { type: "null" }

    ErrorResponse:
      type: object
      required: [status, code, data]
      properties:
        status: { type: string, enum: [error] }
        code:
          type: string
          description: 도메인 에러 코드 (예 `AUTH_TOKEN_EXPIRED`, `TODO_NOT_FOUND`, `VALIDATION_ERROR`)
        data: { type: "null" }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    # ── Enum 정의 ───────────────────────────────────────────────────────────
    OAuthProvider:
      type: string
      enum: [github, google]

    RetroType:
      type: string
      enum: [daily, weekly, monthly, yearly]
      description: 회고 엔트리 종류

    SummaryType:
      type: string
      enum: [weekly, monthly, annual]
      description: AI 요약 주기

    TodoStatus:
      type: string
      enum: [not-start, in-progress, done]

    SummaryStatus:
      type: string
      enum: [pending, in_progress, completed, failed]

    NotificationType:
      type: string
      enum: [info, success, warning, error]

    NotificationCategory:
      type: string
      enum: [sync, summary, system]

    # ── Auth Request ───────────────────────────────────────────────────────
    SendVerificationRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code:
          type: string
          pattern: "^[A-Z0-9]{6}$"
          description: 영문 대문자 또는 숫자 6자리 (서버에서 strip + upper 정규화 후 검증)

    RegisterRequest:
      type: object
      required: [email, password, passwordConfirm, country]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        passwordConfirm: { type: string, minLength: 8 }
        country:
          type: string
          pattern: "^[A-Z]{2}$"
          description: |
            ISO 3166-1 alpha-2 국가 코드 (전 249개국 지원, pycountry 기반).
            예: `KR`, `US`, `JP`. 대소문자/공백은 BE 가 정규화.
        timezone:
          type: string
          nullable: true
          description: |
            IANA timezone identifier (예: `Asia/Seoul`, `America/Los_Angeles`).
            단일 tz 국가(예: KR, JP, FR)는 생략 가능 — BE 가 자동 결정.
            다중 tz 국가(예: US, RU, BR)는 필수. 옵션 조회: `GET /settings/countries/{code}/timezones`.

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    UpdateProfileRequest:
      type: object
      properties:
        display_name: { type: string, nullable: true }
        accountType:
          type: string
          enum: [developer, user]
          description: 계정 유형 변경 (생략 시 기존 값 유지)

    OnboardingCompleteRequest:
      type: object
      required: [country]
      properties:
        country:
          type: string
          pattern: "^[A-Z]{2}$"
          description: ISO 3166-1 alpha-2 국가 코드 (전 249개국 지원)
        timezone:
          type: string
          nullable: true
          description: |
            IANA timezone identifier.
            단일 tz 국가는 생략 가능, 다중 tz 국가는 필수.

    UpdateCountryRequest:
      type: object
      required: [country]
      properties:
        country:
          type: string
          pattern: "^[A-Z]{2}$"
          description: ISO 3166-1 alpha-2 국가 코드 (전 249개국 지원)
        timezone:
          type: string
          nullable: true
          description: |
            IANA timezone identifier.
            단일 tz 국가는 생략 가능 (자동 결정), 다중 tz 국가는 필수.

    UpdateTimezoneRequest:
      type: object
      required: [timezone]
      properties:
        timezone:
          type: string
          example: Asia/Seoul
          description: IANA timezone identifier

    CountryTimezonesResponse:
      type: object
      required: [country, timezones, multi]
      properties:
        country: { type: string, pattern: "^[A-Z]{2}$" }
        timezones:
          type: array
          items: { type: string }
          description: 해당 국가의 IANA tz 옵션 (CLDR-derived, pytz)
        multi:
          type: boolean
          description: 다중 tz 국가 여부. true 면 사용자가 timezone 을 직접 선택해야 함.

    ApiResponseCountryTimezones:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/CountryTimezonesResponse" }

    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ResetPasswordRequest:
      type: object
      required: [token, newPassword, newPasswordConfirm]
      properties:
        token:
          type: string
          minLength: 20
          maxLength: 120
          description: 이메일로 받은 1회용 reset token (URL `?token=...` 그대로 사용)
        newPassword:
          type: string
          minLength: 8
        newPasswordConfirm:
          type: string
          minLength: 8

    # ── Auth Response ──────────────────────────────────────────────────────
    TokenResponse:
      type: object
      required: [accessToken]
      properties:
        accessToken: { type: string }

    UserResponse:
      type: object
      required: [id, email, country, timezone, accountType]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        country:
          type: string
          pattern: "^[A-Z]{2}$"
          example: KR
        region:
          type: string
          nullable: true
          pattern: "^[A-Z]{2}-[A-Z0-9]{1,3}$"
          example: null
        timezone:
          type: string
          example: Asia/Seoul
          description: IANA timezone identifier — AI 자동 요약은 이 tz 기준 "현지 새벽 1시"에 트리거됨
        accountType:
          type: string
          enum: [developer, user]
          default: user
          description: |
            계정 유형. developer = GitHub 커밋 기록·회고 연동 등 개발자 기능 활성화.
            user = 캘린더·할일·회고 중심의 기본 경험.

    ApiResponseToken:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TokenResponse" }

    ApiResponseUser:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/UserResponse" }

    UpdateProfileResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        accessToken:
          type: string
          nullable: true
          description: |
            accountType 변경 시에만 발급되는 새 access token.
            FE는 이 값이 non-null이면 기존 토큰을 즉시 교체해야 한다.
            그 외 변경(displayName 등)은 null.

    ApiResponseUpdateProfile:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/UpdateProfileResponse" }

    OAuthLinkInitResponse:
      type: object
      required: [authorizeUrl]
      properties:
        authorizeUrl:
          type: string
          format: uri
          description: |
            FE 가 `window.open` 으로 직접 열어야 하는 provider authorize URL.
            URL 에는 link 흐름임을 표시하는 state 가 사전 발급되어 있다.

    ApiResponseOAuthLinkInit:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/OAuthLinkInitResponse" }

    SessionResponse:
      type: object
      required: [sessionId, issuedAt, lastUsedAt, rotationCounter, isCurrent]
      properties:
        sessionId: { type: string }
        deviceLabel:
          {
            type: string,
            nullable: true,
            description: "User-Agent 파싱 결과 (예: 'Chrome on Windows')",
          }
        deviceInfo:
          { type: string, nullable: true, description: "User-Agent 원문" }
        ipPrefix:
          {
            type: string,
            nullable: true,
            description: "IPv4 /24 또는 IPv6 /48 prefix. 통계용.",
          }
        issuedAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time }
        rotationCounter:
          { type: integer, description: "이 세션에서 발생한 refresh 횟수" }
        isCurrent: { type: boolean, description: "이 요청을 보낸 세션 여부" }

    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items: { $ref: "#/components/schemas/SessionResponse" }

    ApiResponseSessionList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SessionListResponse" }

    RevokeOthersResponse:
      type: object
      required: [revokedCount]
      properties:
        revokedCount: { type: integer }

    ApiResponseRevokeOthers:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/RevokeOthersResponse" }

    # ── Retro Template ────────────────────────────────────────────────────
    RetroTemplateCreateRequest:
      type: object
      required: [name, content]
      properties:
        name: { type: string }
        content: { type: string, description: "Markdown body. Max 4000 chars." }

    RetroTemplateUpdateRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        content:
          { type: string, nullable: true, description: "omit = unchanged" }

    SetActiveRetroTemplateRequest:
      type: object
      required: [retro_type, template_id]
      properties:
        retro_type: { $ref: "#/components/schemas/RetroType" }
        template_id: { type: string }

    RetroTemplateResponse:
      type: object
      required:
        [
          id,
          user_id,
          retro_type,
          name,
          content,
          is_default,
          is_active,
          created_at,
        ]
      properties:
        id: { type: string }
        user_id: { type: string }
        retro_type: { $ref: "#/components/schemas/RetroType" }
        name: { type: string }
        content: { type: string }
        is_default:
          {
            type: boolean,
            description: "true = 기본 템플릿 (삭제 불가, reset 가능)",
          }
        is_active:
          {
            type: boolean,
            description: "true = 현재 해당 retro_type의 활성 템플릿",
          }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    ApiResponseRetroTemplate:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/RetroTemplateResponse" }

    ApiResponseRetroTemplateList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/RetroTemplateResponse" }

    # ── Todo ───────────────────────────────────────────────────────────────
    TodoCreateRequest:
      type: object
      required: [title, date_key]
      properties:
        title: { type: string }
        date_key: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        description: { type: string, default: "" }
        status:
          $ref: "#/components/schemas/TodoStatus"
          default: not-start
        start_time:
          type: string
          format: date-time
          nullable: true
          description: 'ISO 8601 UTC datetime (e.g. "2026-06-18T00:00:00Z"). Required with timezone when provided.'
        end_time:
          type: string
          format: date-time
          nullable: true
          description: "ISO 8601 UTC datetime. If both provided, must be > start_time."
        timezone:
          type: string
          nullable: true
          description: 'IANA timezone string (e.g. "Asia/Seoul"). Required when start_time or end_time is set.'
        push_to_calendar:
          type: boolean
          nullable: true
          description: >
            null(생략) = user_settings.calendarAutoPushTodo 기본값 적용,
            true/false = 개별 지정(생성 시 Google Calendar push 여부).

    TodoUpdateRequest:
      type: object
      properties:
        title: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/TodoStatus", nullable: true }
        description: { type: string, nullable: true }
        date_key:
          { type: string, pattern: '^\d{4}-\d{2}-\d{2}$', nullable: true }
        start_time:
          type: string
          format: date-time
          nullable: true
          description: "omit = unchanged, null = clear, ISO 8601 UTC = set."
        end_time:
          type: string
          format: date-time
          nullable: true
          description: "omit = unchanged, null = clear, ISO 8601 UTC = set. If both non-null, must be > start_time."
        timezone:
          type: string
          nullable: true
          description: "IANA timezone. omit = unchanged, null = clear, string = set. Required when start_time or end_time is set to non-null."

    TodoResponse:
      type: object
      required:
        [
          id,
          user_id,
          title,
          status,
          date_key,
          description,
          completed,
          created_at,
          calendar_linked,
        ]
      properties:
        id: { type: string }
        user_id: { type: string }
        title: { type: string }
        status: { $ref: "#/components/schemas/TodoStatus" }
        date_key: { type: string }
        description: { type: string }
        completed: { type: boolean, description: 'status == "done"' }
        start_time:
          {
            type: string,
            format: date-time,
            nullable: true,
            description: "UTC datetime or null",
          }
        end_time:
          {
            type: string,
            format: date-time,
            nullable: true,
            description: "UTC datetime or null",
          }
        timezone:
          { type: string, nullable: true, description: "IANA timezone or null" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        calendar_linked:
          type: boolean
          description: "Google Calendar 에 연동됨(push 완료/대기/진행 중). FE 사이드바 버튼 상태."
        calendar_push_status:
          type: string
          nullable: true
          enum: [pending, syncing, synced, failed, pending_delete]
          description: "연동 세부 상태. null 이면 미연동."

    ApiResponseTodo:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/TodoResponse" }

    ApiResponseTodoList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/TodoResponse" }

    # ── Google Calendar ──────────────────────────────────────────────────────
    CalendarEventResponse:
      type: object
      description: |
        Google Calendar 이벤트(read-only). 시간 표현은 todo 와 동일 정책 —
        시간 지정 이벤트는 `startAt`/`endAt`(UTC) + `timezone`(IANA) 으로 로컬 복원,
        종일 이벤트는 `allDay=true` 이고 시간 필드는 null, `dateKey` 만 의미가 있다.
      required: [id, title, allDay, dateKey, status, source]
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        location: { type: string, nullable: true }
        startAt:
          {
            type: string,
            format: date-time,
            nullable: true,
            description: "UTC datetime or null(종일)",
          }
        endAt: { type: string, format: date-time, nullable: true }
        allDay: { type: boolean }
        dateKey: { type: string, description: "YYYY-MM-DD (이벤트 날짜)" }
        timezone:
          {
            type: string,
            nullable: true,
            description: "IANA timezone or null(종일)",
          }
        status: { type: string, description: "confirmed | tentative" }
        htmlLink:
          {
            type: string,
            nullable: true,
            description: "Google Calendar 원본 링크",
          }
        source:
          {
            type: string,
            enum: [google_calendar],
            description: "todo 와 구분용 상수",
          }

    CalendarConnectionResponse:
      type: object
      required: [connected, needsReauth]
      properties:
        connected:
          { type: boolean, description: "Google Calendar 연결 존재 여부" }
        needsReauth:
          type: boolean
          description: "true 면 refresh_token 무효(만료/revoke) — FE 가 재연결 유도"
        googleUserId: { type: string, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }

    ApiResponseCalendarConnection:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/CalendarConnectionResponse" }

    CalendarConnectInitResponse:
      type: object
      required: [authorizeUrl]
      properties:
        authorizeUrl:
          type: string
          description: "FE 가 popup 으로 여는 Google 동의 URL"

    ApiResponseCalendarConnectInit:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/CalendarConnectInitResponse" }

    ApiResponseCalendarEventList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/CalendarEventResponse" }

    # ── Entry ──────────────────────────────────────────────────────────────
    EntryCreateRequest:
      type: object
      required: [date_key, title]
      properties:
        date_key: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
        title: { type: string }
        content: { type: string, default: "" }
        retro_type:
          $ref: "#/components/schemas/RetroType"
          default: daily

    EntryUpsertRequest:
      $ref: "#/components/schemas/EntryCreateRequest"

    GithubPushResponse:
      type: object
      required: [pushedAt, commitSha, htmlUrl, path, repositoryFullName]
      description: |
        해당 회고록이 GitHub 에 push 되어 있다는 신호. push 단위는 (period_type, period_key)
        — 같은 period 에 entry/summary 가 같이 있으면 둘 다 동일한 push 레코드를 가리킨다.
        (GitHub 측 파일이 단일이므로 의도된 동작.)
      properties:
        pushedAt: { type: string, format: date-time }
        commitSha: { type: string }
        htmlUrl: { type: string, format: uri }
        path:
          type: string
          description: 저장소 내 파일 경로 (예 'daily/2026-06-08.md')
        repositoryFullName: { type: string, example: "owner/archive" }

    EntryResponse:
      type: object
      required: [id, user_id, date_key, title, content, retro_type, created_at]
      properties:
        id: { type: string }
        user_id: { type: string }
        date_key: { type: string }
        title: { type: string }
        content: { type: string }
        retro_type: { $ref: "#/components/schemas/RetroType" }
        githubPush:
          allOf:
            - $ref: "#/components/schemas/GithubPushResponse"
          nullable: true
          description: |
            해당 (retro_type, date_key) 기반 period 에 push 된 적이 없으면 null.
            `GET /entries` 는 비개발자/GitHub 미연결 사용자에게 이 키 자체를 생략하지만,
            `GET /entries/paginated` 는 항상 키가 존재한다(값만 null).
        isSummary:
          type: boolean
          default: false
          description: |
            true 면 `journal_entries` 가 아니라 `retro_summaries`(AI 생성 요약, weekly/
            monthly/annual)에서 온 항목 — `GET /entries/paginated` 전용, `GET /entries`
            에서는 항상 false.
        status:
          type: string
          nullable: true
          enum: [pending, in_progress, completed, failed]
          description: isSummary=true 일 때만 의미 있음(요약 생성 상태). entry 는 null.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    ApiResponseEntry:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EntryResponse" }

    ApiResponseEntryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/EntryResponse" }

    EntryPageResponse:
      type: object
      required: [items, total, page, size]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/EntryResponse" }
        total: { type: integer, description: 전체 매칭 건수(페이지 무관) }
        page: { type: integer }
        size: { type: integer }

    ApiResponseEntryPage:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/EntryPageResponse" }

    # ── Search ─────────────────────────────────────────────────────────────
    GlobalSearchResponse:
      type: object
      required: [todos, entries]
      properties:
        todos:
          type: array
          items: { $ref: "#/components/schemas/TodoResponse" }
        entries:
          type: array
          items: { $ref: "#/components/schemas/EntryResponse" }

    ApiResponseGlobalSearch:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/GlobalSearchResponse" }

    # ── Summary ────────────────────────────────────────────────────────────
    SummaryContentResponse:
      type: object
      description: >
        AI 생성 요약 마크다운 문자열.
        사용자 템플릿이 있으면 그 블록 구조(헤딩/불릿/번호목록/체크박스/인용구 등)를 그대로 따른다.
        템플릿이 없으면 기본 4-섹션 마크다운(## 헤딩 + 불릿 리스트)이 생성된다.
        FE 는 Tiptap 마크다운 확장으로 렌더링한다.
      required: [markdown]
      properties:
        markdown:
          type: string
          description: AI 생성 마크다운 원문

    SummaryResponse:
      type: object
      required:
        [
          id,
          user_id,
          summary_type,
          period_start,
          period_end,
          status,
          created_at,
        ]
      properties:
        id: { type: string }
        user_id: { type: string }
        summary_type: { $ref: "#/components/schemas/SummaryType" }
        period_start: { type: string, format: date }
        period_end: { type: string, format: date }
        status: { $ref: "#/components/schemas/SummaryStatus" }
        content:
          $ref: "#/components/schemas/SummaryContentResponse"
          nullable: true
        editedContent:
          type: string
          nullable: true
          maxLength: 50000
          description: >
            사용자 편집 마크다운 오버라이드. 있으면 FE 는 이 마크다운을 우선 렌더하고,
            null 이면 content.markdown 을 Tiptap 으로 렌더한다.
            AI 원본(content)은 비파괴 보존되며, 재생성(force/FAILED/auto) 시 자동으로 null 로 초기화된다.
        githubPush:
          allOf:
            - $ref: "#/components/schemas/GithubPushResponse"
          nullable: true
          description: 해당 summary 의 (summary_type, period_start) 기반 period 에 push 된 적이 없으면 null
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }

    SummaryEditRequest:
      type: object
      required: [contentMarkdown]
      properties:
        contentMarkdown:
          type: string
          nullable: true
          maxLength: 50000
          description: >
            편집 마크다운. null 이면 편집 해제 → AI 원본(content.markdown)으로 복귀(AI 재호출/rate limit 없음).

    ApiResponseSummary:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SummaryResponse" }

    ApiResponseSummaryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/SummaryResponse" }

    SummaryReadinessResponse:
      type: object
      required:
        - summaryType
        - periodStart
        - periodEnd
        - expectedUnits
        - coveredUnits
        - entryCount
        - completenessRatio
        - recommendation
      properties:
        summaryType:
          type: string
          enum: [monthly, annual]
        periodStart: { type: string, format: date }
        periodEnd: { type: string, format: date }
        expectedUnits:
          type: integer
          description: monthly = 그 달의 일수, annual = 12
        coveredUnits:
          type: integer
          description: monthly = entry 있는 unique 날짜 수, annual = entry 있는 월 수
        entryCount:
          type: integer
          description: 기간 내 총 entry 수 (참고용, 임계값에 직접 영향 없음)
        completenessRatio:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: coveredUnits / expectedUnits, 소수 4자리 반올림
        recommendation:
          type: string
          enum: [ok, insufficient]
          description: completenessRatio >= 0.7 이면 ok, 미만이면 insufficient

    ApiResponseSummaryReadiness:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SummaryReadinessResponse" }

    # ── Summary Template ──────────────────────────────────────────────────
    CreateSummaryTemplateRequest:
      type: object
      required: [name, content]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: 사용자 식별용 이름. 같은 (user, summary_type) 안에서 unique.
        content:
          type: string
          minLength: 1
          maxLength: 4000
          description: markdown 본문. AI 프롬프트의 `<USER_TEMPLATE>` 블록에 그대로 들어간다.

    UpdateSummaryTemplateRequest:
      type: object
      required: [name, content]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        content:
          type: string
          minLength: 1
          maxLength: 4000

    SetActiveSummaryTemplatesRequest:
      type: object
      description: |
        summary_type 별 활성 ID 부분 갱신. 미전송 필드는 변경 없음.
        명시적 null 은 해당 type 비활성화 (시스템 기본 사용).
      properties:
        weekly: { type: string, nullable: true }
        monthly: { type: string, nullable: true }
        annual: { type: string, nullable: true }

    SummaryTemplateResponse:
      type: object
      required: [id, userId, summaryType, name, content, isActive, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        summaryType: { $ref: "#/components/schemas/SummaryType" }
        name: { type: string }
        content: { type: string }
        isActive:
          type: boolean
          description: |
            true 이면 이 템플릿이 user_settings.active_summary_template_ids[type] 으로 지정되어
            AI 자동 요약 생성 시 사용된다. 한 (user, type) 당 최대 1개.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    ApiResponseSummaryTemplate:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SummaryTemplateResponse" }

    ApiResponseSummaryTemplateList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/SummaryTemplateResponse" }

    UsageStateResponse:
      type: object
      required:
        - summaryType
        - used
        - limit
        - windowSeconds
        - retryAfterSeconds
      properties:
        summaryType: { $ref: "#/components/schemas/SummaryType" }
        used:
          type: integer
          description: 현재 7일 윈도우 안의 사용 횟수
        limit:
          type: integer
          description: 한도. weekly=10, monthly=3, annual=1
        windowSeconds:
          type: integer
          description: rolling window 길이(초). 현재 7일 = 604800
        retryAfterSeconds:
          type: integer
          description: |
            남은 한도 있으면 0. 초과 상태면 가장 오래된 사용량이 윈도우에서
            빠지는 시각까지의 남은 초.

    SummaryUsageResponse:
      type: object
      required: [weekly, monthly, annual]
      properties:
        weekly: { $ref: "#/components/schemas/UsageStateResponse" }
        monthly: { $ref: "#/components/schemas/UsageStateResponse" }
        annual: { $ref: "#/components/schemas/UsageStateResponse" }

    ApiResponseSummaryUsage:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SummaryUsageResponse" }

    # ── Notification ───────────────────────────────────────────────────────
    NotificationResponse:
      type: object
      required: [id, type, category, title, message, is_read, created_at]
      properties:
        id: { type: string }
        type: { $ref: "#/components/schemas/NotificationType" }
        category: { $ref: "#/components/schemas/NotificationCategory" }
        title: { type: string }
        message: { type: string }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }

    ApiResponseNotificationList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/NotificationResponse" }

    # ── Settings ───────────────────────────────────────────────────────────
    GitHubSettingsBlock:
      type: object
      description: |
        Settings 내 GitHub 관련 사용자 설정 네임스페이스.
        top-level 평탄화 대신 중첩 형태로 운용 — 향후 GitHub 관련 사용자 설정이 늘어도 top-level 오염 없음.
      properties:
        pushTargetRepositoryId:
          type: string
          nullable: true
          example: ghrepo_01HXYZ...
          description: |
            회고 push 대상 저장소 id. 사용자가 연결한 저장소 중 하나여야 함.
            연결 안 된 id 지정 시 `GITHUB_REPOSITORY_NOT_LINKED` (400).
            null로 명시하면 push target 해제.

    ActiveSummaryTemplateIdsBlock:
      type: object
      description: |
        summary_type 별 활성 템플릿 ID. null 이면 시스템 기본 사용.
        변경은 `PUT /settings/auto-summary/active` 로만 가능 (보안 / 검증 일원화).
      properties:
        weekly: { type: string, nullable: true }
        monthly: { type: string, nullable: true }
        annual: { type: string, nullable: true }

    UpdateSettingsRequest:
      type: object
      properties:
        locale:
          type: string
          maxLength: 10
          default: ko
          description: |
            BCP 47 prefix (ko, en, ja 등). AI 자동 요약 출력 언어를 결정한다.
            매핑 없는 코드는 best-effort 로 SDK 에 전달.
        autoSummaryWeekly: { type: boolean, default: false }
        autoSummaryMonthly: { type: boolean, default: false }
        autoSummaryYearly: { type: boolean, default: false }
        notificationRetentionDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 30
        lastScheduleCheckAt:
          type: string
          format: date-time
          nullable: true
        calendarAutoPushTodo:
          type: boolean
          default: false
          description: "신규 할 일 생성 시 기본으로 Google Calendar 에 push 할지(생성 기본값 전용, 소급 적용 안 함)."
        calendarAutoDeleteTodo:
          type: boolean
          default: false
          description: |
            **주의**: true 로 설정하면 Google Calendar 에서 이벤트를 삭제(cancel)할 때
            연동된 ARCHIVE 할 일도 함께 영구 삭제됩니다. 캘린더에서 일정을 정리하거나
            대량 삭제하면 대응하는 할 일도 되돌릴 수 없이 삭제되니 주의해서 켜세요.
            기본값(false)은 연동만 해제하고 할 일은 유지합니다.
        github:
          $ref: "#/components/schemas/GitHubSettingsBlock"

    SettingsResponse:
      type: object
      required:
        [
          locale,
          autoSummaryWeekly,
          autoSummaryMonthly,
          autoSummaryYearly,
          notificationRetentionDays,
          calendarAutoPushTodo,
          calendarAutoDeleteTodo,
          github,
          activeSummaryTemplateIds,
        ]
      properties:
        locale: { type: string }
        autoSummaryWeekly: { type: boolean }
        autoSummaryMonthly: { type: boolean }
        autoSummaryYearly: { type: boolean }
        notificationRetentionDays: { type: integer }
        lastScheduleCheckAt:
          type: string
          format: date-time
          nullable: true
        calendarAutoPushTodo:
          type: boolean
          description: "신규 할 일 생성 시 기본 Google Calendar push 여부."
        calendarAutoDeleteTodo:
          type: boolean
          description: |
            true 면 Google Calendar 에서 이벤트 삭제 시 연동된 할 일도 함께 영구 삭제.
            false(기본) 면 연동만 해제하고 할 일은 유지.
        github:
          $ref: "#/components/schemas/GitHubSettingsBlock"
        activeSummaryTemplateIds:
          $ref: "#/components/schemas/ActiveSummaryTemplateIdsBlock"

    ApiResponseSettings:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/SettingsResponse" }

    # ── GitHub Repository ──────────────────────────────────────────────────
    LinkRepositoryRequest:
      type: object
      required: [githubRepoId]
      properties:
        githubRepoId:
          type: integer
          format: int64
          minimum: 1
          description: GitHub의 numeric repository ID

    RepositoryResponse:
      type: object
      required:
        [
          id,
          githubRepoId,
          owner,
          name,
          fullName,
          isPrivate,
          defaultBranch,
          htmlUrl,
          commitReadEnabled,
          createdAt,
        ]
      properties:
        id:
          {
            type: string,
            description: 백엔드에서 발급한 연결 ID (`ghrepo_...`),
          }
        githubRepoId: { type: integer, format: int64 }
        owner: { type: string }
        name: { type: string }
        fullName: { type: string, example: octocat/Hello-World }
        isPrivate: { type: boolean }
        defaultBranch: { type: string, example: main }
        htmlUrl: { type: string, format: uri }
        commitReadEnabled:
          type: boolean
          default: true
          description: 회고 화면 "오늘의 커밋" 집계 대상 여부 (PATCH로 토글)
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    UpdateRepositoryRequest:
      type: object
      required: [commitReadEnabled]
      properties:
        commitReadEnabled: { type: boolean }

    AvailableRepositoryResponse:
      type: object
      required:
        [githubRepoId, owner, name, fullName, isPrivate, defaultBranch, htmlUrl]
      properties:
        githubRepoId: { type: integer, format: int64 }
        owner: { type: string }
        name: { type: string }
        fullName: { type: string }
        isPrivate: { type: boolean }
        defaultBranch: { type: string }
        htmlUrl: { type: string, format: uri }

    ApiResponseRepository:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/RepositoryResponse" }

    ApiResponseRepositoryList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/RepositoryResponse" }

    ApiResponseAvailableRepoList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data:
              type: array
              items:
                { $ref: "#/components/schemas/AvailableRepositoryResponse" }

    # ── GitHub Connection ──────────────────────────────────────────────────
    ConnectionStatusResponse:
      type: object
      required: [connected, hasVerifiedEmails]
      properties:
        connected:
          type: boolean
          description: GitHub OAuth 연결 + 토큰 유효성 검증 결과
        login:
          type: string
          nullable: true
          example: octocat
          description: connected=true일 때만 값 존재
        pushTargetRepositoryId:
          type: string
          nullable: true
          example: ghrepo_01HXYZ...
          description: 회고 push 대상 저장소 id. 미설정 시 null.
        hasVerifiedEmails:
          type: boolean
          description: |
            GitHub 계정의 verified emails 가 1개 이상 캐시돼 있는지 (`provider_verified_emails`).
            **false** 면 `GET /github/commits` 의 author 매칭이 login 으로만 동작 → 사용자가
            gitbash 등 로컬 `git config user.email` 로 push 한 commit 이 표시 안 될 수 있음.
            FE 는 false 이면 "GitHub 재연결" 또는 "GitHub Settings → Emails 에 commit email 추가"
            안내 권장.

    ApiResponseConnectionStatus:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/ConnectionStatusResponse" }

    # ── GitHub Commits ─────────────────────────────────────────────────────
    CommitResponse:
      type: object
      required:
        [repositoryId, fullName, sha, message, htmlUrl, author, committedAt]
      properties:
        repositoryId: { type: string, description: 백엔드 저장소 연결 ID }
        fullName: { type: string, example: octocat/Hello-World }
        sha: { type: string, example: 8f23c41 }
        message:
          type: string
          description: 커밋 메시지 첫 줄만 (서버에서 200자 자름)
        htmlUrl: { type: string, format: uri }
        author: { type: string, description: 작성자 GitHub login }
        committedAt: { type: string, format: date-time }

    FailedRepositoryResponse:
      type: object
      required: [repositoryId, fullName, reason]
      properties:
        repositoryId: { type: string, description: 백엔드 저장소 연결 ID }
        fullName: { type: string, example: octocat/Hello-World }
        reason:
          type: string
          enum: [not_found, unknown]
          description: |
            - `not_found`: GitHub 가 404 응답. 저장소 삭제, 또는 private+scope 부족.
            - `unknown`: 예기치 못한 예외. 백엔드 logger 의 `github.commits.unknown_error` 참조.

    CommitListResponse:
      type: object
      required: [commits, failedRepositories]
      properties:
        commits:
          type: array
          items: { $ref: "#/components/schemas/CommitResponse" }
        failedRepositories:
          type: array
          items: { $ref: "#/components/schemas/FailedRepositoryResponse" }

    ApiResponseCommitList:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/CommitListResponse" }

    # ── GitHub Retrospective Push ──────────────────────────────────────────
    PushRetrospectiveRequest:
      type: object
      required: [periodType, periodKey, contentMarkdown]
      properties:
        periodType:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY, ANNUAL]
        periodKey:
          type: string
          description: |
            periodType별 형식 (서버 검증 정규식):
            - DAILY:  `^\d{4}-\d{2}-\d{2}$` (예: `2026-06-12`)
            - WEEKLY: `^\d{4}-\d{2}-W[1-6]$` (예: `2026-06-W2`, majority-day 방식)
            - MONTHLY: `^\d{4}-\d{2}$` (예: `2026-06`)
            - ANNUAL: `^\d{4}$` (예: `2026`)
        contentMarkdown:
          type: string
          minLength: 1
          maxLength: 1000000
          description: 회고 본문 (마크다운). 그대로 파일 내용으로 저장됨.

    PushResultResponse:
      type: object
      required: [commitSha, htmlUrl, path]
      properties:
        commitSha: { type: string, example: 8f23c41abcd... }
        htmlUrl:
          {
            type: string,
            format: uri,
            description: GitHub 상 파일 또는 커밋 링크,
          }
        path: { type: string, example: 일간/2026-06-12 회고록.md }

    ApiResponsePushResult:
      allOf:
        - $ref: "#/components/schemas/ApiResponseEmpty"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/PushResultResponse" }
